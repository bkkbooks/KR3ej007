body:
  text: 跋一曾世榮活幼新書上中下三卷上卷為決證詩賦中卷為明本論並拾遺下卷為信效方並抬遺余向曾見此刻多闕失故未收後又收得一本非此刻矣適從五硯樓以醫書一櫥歸海寧友人余為之介遂檢得是書中多缺葉影鈔別本補全即所收之又一本而非原刻也重付裝池而識其緣起如此嘉慶辛未中秋前二日復翁丕烈識跋二元本活幼心書三卷每半葉十一行每行二十一二字不等蓋至元甲午曾氏原刻全帙藝風前輩所藏士禮居本也德顯出處無徵是書辨證詳明處方精審允為仁人之言自序備述淵源極有心得爰為重刻以廣流傳同衡陽縣誌及各家著錄多作新書黃跋偶沿其誤千頃堂書目光緒湖南通志據抱經堂補元志並作二卷殆亦未見全書明宣德庚戍有修補本日本享保甲寅曾為校刻皆不及此本之善因屬翟君展成鳳翔蕭君伯丞延平再三讎校改正良多並附校記於後其昭晰無疑者不復贅列庶後之君子有所考焉宣統二年庚戍二月武昌柯逢時
