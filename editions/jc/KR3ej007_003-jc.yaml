時帶涼服治暑風證先投此劑得效次服卻暑丹其搐不致再發定喘飲治夾風痰喘氣促不拘冷熱二證人參去蘆麻黃不去根節防己去黑皮訶子去核半夏同上制甘草六味各五錢上件㕮咀每服二錢水一盞姜二片煎七分無時溫服常山飲治瘧後單熱不退常山檳榔二味各二兩烏梅一兩和核上前二味各銼片各用醇醋釀一宿常山炒乾榔檳曬乾仍同烏梅㕮咀每服二錢水一盞煎七分熱未發先空心帶涼服仍忌雞酒羊面生果毒物有寒熱經久不除者加此劑於小柴胡湯或藿香飲內同煎亦效消毒飲解急驚風毒赤紫丹瘤壯熱狂躁睡臥不安胸膈滿悶咽喉腫痛九道有血妄行及遍身瘡疥牛蒡子六兩荊芥穗二兩甘草一兩上件㕮咀每服二錢水一盞煎七分無時溫服縮砂飲和胃氣消宿食及理腹痛快膈調脾沉香一兩縮砂仁烏藥二味各二兩淨香附四兩甘草炙一兩二錢上除沉香不過火餘四味銼焙仍同沉香研為細末每服一錢用溫鹽湯無時調服或空心燒鹽湯調下亦好及紫蘇棗湯尤妙定吐飲治吐逆投諸藥不止用此神效半夏同前制㕮咀如綠豆大節去細末二兩生薑淨洗拭乾和皮二兩薄桂去粗皮㕮咀三錢上生薑切作小方塊如綠豆大同前半夏和勻入小鐺內慢火順手炒令香熟帶干方下桂再炒勻微有香氣以皮紙攤盛地上出火毒候冷略簸去黑焦末每服二錢水一盞姜二片煎七分稍空心少與緩服萬安飲此劑能推陳致新除邪輔正和益脾胃宣通氣血調順飲食疏解風寒寧心化痰去煩理熱不拘證在表裡並宜可投常服百病不生貞元益固補養諸虛亦有驗矣此方與宣明論當歸飲相類不遠治法最多其藥品之外惟加枳殼半夏人參去蘆當歸酒洗大黃生用防風去蘆柴胡去蘆枳殼同前制半夏同上制芍藥淨洗黃芩甘草十味各一兩滑石末六兩上件㕮咀除滑石末臨入和勻每服二錢水一盞姜二片煎七分無時溫服或加棗一枚同煎金餅門金類一字金治初生嬰孩一七之外欲成臍風撮口及卒中急驚慢風牙關緊閉痰涎上壅殭蠶去絲威靈仙去蘆二味各四錢明白礬生用二錢細辛去葉一錢甘草生用二錢半上件銼焙為末每服一字至半錢薑汁沸湯調和以指抹入牙關內治卒中急慢驚證口噤不開用鹽梅湯調擦上下牙根二處一匕金治痘瘡黑陷或變紫黯色證在急危但投此藥亦能頓蘇而復紅壯則此劑又勝人齒散若精神昏慢口鼻氣冷不復救矣穿山甲同上制五錢紅色曲炒川烏一枚灰火中帶焦炮二味各二錢半上研為末入麝香半字同在乳缽杵勻每用一匕用蔥白濃煎湯調下止投一服或二服一抹金治遍身生瘡潰爛如糜梨燥痛膿汁不幹黎蘆淨洗焙蛇床子去埃土紅丹火飛過三味各五錢硫黃赤石脂明白礬火飛過五倍子去內蟲屑黃柏去粗皮五味各二錢輕粉五十帖上前八味或曬或焙為末仍同輕粉在乳缽再杵勻用生肥豬膏碎切以瓦缽和藥末爛杵塗抹患處或清油調搽亦可餅類香橘餅治嬰孩過傷乳食或吐或瀉及病後虛中感積成痢氣弱神昏面黃目慢南木香陳橘皮去白青皮去白三味各二錢半厚朴同上制七錢縮砂仁神麯濕紙裹炮麥芽淨洗焙三味各五錢三稜炮銼三錢上除木香不過火餘七味銼焙仍同木香研為細末煉蜜捻作餅子如芡實大每服一餅至三餅用棗湯化開空心溫服米清湯亦可通聖餅治大府閉澀連日不通滿腹膨脹氣壅悶亂服藥罔效淨黃連二錢巴豆生蒜一個生鹽半錢上以黃連銼碎為末同後三味石缽內爛杵捻作餅子寸半闊貼臍緊搓干艾切作綠豆大五枚作五次安臍間餅子上以火灸之即通姜豉餅治久因濕氣中於膀胱復為風邪客熱攻激小便不利臍凸腹脹食減作痛先投解表散後用此藥貼之生薑一兩碎切生蔥五根豆豉七錢潤者生鹽一錢生蒜七個碎切酜糟一燈盞無有糟酒代穿山甲同上制五錢上件入石缽內同杵爛捻作餅子二寸闊用微火炒熱帶溫貼臍上外以絹帕兜住如冷依前法換帶溫者貼之或再以火烘暖亦好拾遺香艾丸此劑小兒常進驚積自除色澤殊異手足肥健脾胃調和兼理男子婦人諸虛不足生氣血暖中焦固養精神消進飲食男子服之身體強壯寒暑耐安婦人投之百病不生經脈通順淨香附一斤干艾葉四兩上二味瓦器盛用醇醋浸經七日於淨鍋內用火煮令醋盡就炒乾研為細末仍用醋煮粳米粉為糊入乳缽亭分杵勻小兒丸如蘿蔔子大人丸如梧桐子每服三十丸至五十丸或七十丸湯酒米飲隨意送下並不拘時婦人血氣素虛無生育者加琥珀二兩同作丸服極效粒數湯使下法亦依前或用棗湯烏白丸治五六歲以上小兒頭風苦痛或一邊作痛及療耳聤耳綿川烏湯浸潤略炮去皮臍草烏略炮去皮川白芷蒼朮如上制四味各一兩上件銼焙為末用生蔥汁合面糊丸綠豆大慢火焙乾睛曬亦好每服三十丸至五十丸或七十丸食後臨臥用溫清茶送下其蔥汁法用生蔥不去根葉入水同搗爛取汁既濟解毒丹治小兒中熱睡中咬牙夢語驚悸不寧或吐血溺血強渴引飲手足動搖狀似鬼祟並宜投服淨黃連五分黃葉去粗皮黃芩淨者大黃三味各二錢半肉桂去粗皮枳殼同上制白茯苓去粗皮三味各二錢甘草生用七錢上除桂不過火餘七味銼焙仍同桂為末滴水乳缽內熟杵丸綠豆大帶潤以水飛硃砂末為衣陰乾每服三十丸至五十丸用麥門冬熟水無時送下吐血溺血梔子仁煎湯下兒小者薄荷湯磨化投服輕粉散治長成小兒蟲蛀牙疼飲食不便輕粉白礬生用雄黃紅丹四味各一錢麝香半字上件入乳缽細杵為末先用五倍子鶴蝨生蔥煮水大半碗候溫灌漱令淨次以前末藥一字或半錢擦患處六七次即效獨聖散治嬰孩滿口白屑或如粟谷糜爛作痛不能乳食晝夜煩啼此名鵝口證大北南星銼開白者為佳不拘多少上件為末炒一錢或二錢醋蜜調塗囟門上於中間留一小指大不塗及敷男左女上足心仍以立效飲溫蜜水調點舌上令其自化尤佳藿香托裡散治諸腫毒癰疽已潰未潰者及疔瘡流注遍身並內外一切黃證噁心嘔逆憎寒壯熱晝夜疼痛不拘老少悉宜服之此藥非特解毒大能正氣理虛祛風去煩排膿活血定痛消腫藿香連翹山梔仁川當歸酒洗木通去節芍藥殭蠶去絲甘草八味各二錢半大黃生用茵陳黃耆生用貝母四味各五錢上件㕮咀每服二錢酒水各大半盞煎八分病在上食後溫服病在下食前溫服拔毒散治癲犬惡大所傷不拘老幼並宜可投斑蝥七枚去翅足用屋瓦盛入糯米同一處勻炒候米黃為度以乳缽細杵羅過不用米黑牽牛末二錢半先曬研取末上二味和勻用無灰溫酒調作一服空心投其毒自小便中出或從大府過似葡萄肉或如犬形見毒出盡尚覺腹中有痛取用青黛入乳缽杵勻仍羅為末每服三錢井花水調下二服不拘時神應散治小兒大人虛嗽神效罌粟殼去梗蒂銼碎蜜水炒杏仁湯泡去皮尖炒過白膠香浮者水煮過濾干人參去蘆阿膠銼碎炒過麻黃去節存根烏梅和核五味各二兩桑白皮去粗皮銼碎蜜水炒透款冬花浮者四味各一兩甘草炙一兩上件㕮咀每服二錢水大盞姜三片棗一枚煎八分空心溫服或不拘時涼肺散治小兒大人一切實嗽桑白皮去粗皮銼碎蜜水炒過二兩桔梗銼炒天花粉淨者乾葛麻黃不去根節薄荷和梗黃芩杏仁不去皮尖知母貝母木通去節十味各一兩款冬花淨者麥門冬去心二味各七錢半甘草生用一兩八錢上件㕮咀每服二錢水大盞姜三片蔥一根煎八分無時溫服如有熱氣促加大黃制枳殼各一兩玄明粉治腎水衰虛肝經邪熱視物不明或生障翳脡肉攀睛迎風淚出或如蠅飛油星或睛澀腫痛養不可忍並皆治之及療風熱上壅咽痛口瘡痰實咳嗽不活悉宜加諸藥內自然作效明淨朴硝上於臘月霜雪凝寒之際用皂莢三兩重略炮捶碎溫熱湯六碗挪去渣浸化薄皮紙二重濾過澄清入鐵鍋煮至一半候溫傾出瓦盆內於見天處露一宿次早結塊再用淨熱水六碗化開入大蘿蔔八兩重切作二分厚一片同煮見蘿蔔熟為度仍便在瓦盆去蘿蔔片放在見天處露一宿次日結塊去水取去濾干入好皮紙袋盛懸卦當風處自然成粉用以點眼只如常法治風熱等疾隨意加減用之必勝散治小兒大人病中聞飲食藥氣即噁心乾嘔不能療者川白芷不拘多少上件銼曬或焙研為細末抄一字及半錢於舌上令其自化或用掌心盛之以舌舐咽兒小者溫淨湯濃調少與含化並不拘時至六七次即效遠徹膏治大小府秘澀投諸藥無驗不拘老幼並皆療之穿山甲尾足上者佳燒透二錢重五靈脂淨者二錢重上二味研為細末次以巴豆二錢重去殼研碎和前藥末仍用大蒜四錢重去上粗皮三五層於砂缽內爛杵如泥丸作一餅納臍中以絹帕系之外以掌心火上烘熱熨至八九次聞腹中微響即通至聖散治老幼暴吐服藥不止者神驗枇杷葉淨刷去葉後毛銼碎二兩重半夏㕮咀淨者四兩重上件用生薑四兩重切作綠豆大拌勻釀一宿慢火炒令微焦色以皮紙盛於地上候冷每服二錢水一盞煎七分去渣空心少與緩投或入諸藥內同煎服亦效八仙飲治小兒男子婦人血風目疾經久不瘥晝夜澀痛視物不明甚至生翳散漫投諸藥未驗者生乾地黃淨洗焙乾赤芍藥大川芎羌活川當歸尾酒洗焙乾龍膽草漢防己甘草八味各五錢上件㕮咀每服二錢水一盞白蜜半匙煎八分去渣食後臨臥二時溫服
