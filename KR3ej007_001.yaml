body:
  text: 卷上決證詩賦觀形氣觀形觀氣要精通稟受元來自不同細察盈虧明部分隨機用藥見奇功形者面色也氣者神氣也張吉夫云小兒證候不可取之一端在表裡相應隨機消息豈膠柱調瑟者所能觀其形而知其證哉信斯言也況小兒虛實有非系乎肥瘦而系乎氣色者何以言之蓋有肥而氣怯瘦而氣壯氣怯則色必嫩其為虛可知矣氣壯則色必盛其為實可知矣由是論之五臟之氣皆形於面部肝青心赤肺白腎黑脾黃是其本體肝旺於春心旺於夏肺旺於秋腎旺於冬各七十二日脾寄旺於四季後一十八日是其本位然有時乎不春不冬而面變青黑者非肝之與腎也不秋不夏而面變赤白者亦非心之與肺也蓋五臟之氣層見疊出隨證流形初無一定忽然青黑主乎痛忽然赤者主乎熱忽然白者主乎冷忽然黃者主乎積此其氣之開闔非系乎時非拘乎位又如心主頦肝主眼並左瞼脾主唇之上下肺主右瞼腎主耳前頦音孩外其形或見於位或露於他部所謂不可取之一端明其義也且脾主唇之上下為吐瀉或患痢日久然其色黑則腎之乘脾水反剋土名為強勝其藏或敗耳肝主眼並左瞼其色青本色也主驚駭風痰發動是為順證若見白色乃肺之克肝即為逆證以此推考變而通之存乎其人學者留心於此誠有用焉及幼攻補察病必須明表裡更詳虛實在初分惡攻喜補人皆信誰識攻中有補存張子和曰人身不過表裡血氣不過虛實此言其大略耳惟庸工之治病純補其虛不敢治其實舉世皆曰平穩誤人不見其迹渠亦不自省其過雖終老而不悔且曰吾用補藥也何罪焉病人亦曰彼以補藥補我彼何罪焉雖死亦不知覺此庸工誤人最深如鯀湮洪水不知五行之道夫補者人所喜攻者人所惡醫者以其逆病人之心而不見用不若順病人之心而獲利也豈復計病者之死生乎蓋醫有賢愚人多謬誤以賢為非以愚為是不明標本妄投藥餌自取危困徒切感慨所謂攻者萬病先鬚髮散外邪表之義也外邪既去而元氣自復即攻中有補存焉里之義也然察其表裡虛實尤在臨機權變毋執一定之規也戒毀同道大抵行醫片言處深思淺發要安詳更兼忠厚斯為美切戒逢人恃己長鄭端友曰醫門一業慈愛為先嘗存救治之心方集古賢之行近世醫者診察諸疾未言理療訾毀前醫不量病有淺深效有遲速亦有陰虛陽實翕合轉移初無定論惟務妒賢嫉能利己害人驚謔病家意圖厚賂尤見不仁之心甚矣昔神宗時錢仲陽為醫有聲皇子儀國公病瘛瘲國醫莫能治長公主朝因言錢乙起草野有異能立召入進黃土湯而愈神宗褒諭問黃土何以愈斯疾狀乙對曰以土勝水木得其平則風自止且諸醫所治垂愈小臣適當其愈上悅其對擢太醫丞賜紫衣金魚一旦超然衆醫之表豈不貴哉學者能以仲陽之心為心則善矣為醫先去貪嗔為醫先要去貪嗔用藥但憑真實心富不過求貧不倦神明所在儼如臨人有恆心踐履端謹始可與言醫道矣凡有請召不以晝夜寒暑遠近親疏富貴貧賤聞命即赴視彼之疾舉切吾身藥必用真財無過望推誠拯救勿憚其勞冥之中自有神佑如臨汝張彥明為醫未嘗以錢為較應有求醫期於必效一日城中火災周回爇盡煙焰中獨存其居後且子孫榮貴以此見天道有陰扶顯助之靈誠為可敬辨證早決安危色脈參詳貴造微早憑疾證決安危時醫怕觸病家諱病稍差池便怨咨為醫固難及幼尤難故醫者診視小兒之證倘色脈精明則死生可判若以恐觸病家之諱猶豫其説不吐真情稍有差池必招其怨與其受怨於後孰若告之於先縱有危難夫復何怨昔扁鵲見桓侯曰疾在腠理不治將深恆侯不信復見曰疾在骨髓雖司命無如之何後果弗起學者於此觸類究心斯有得於扁鵲之妙旨五色主病積黃青則是驚風熱赤傷寒紫淡紅黑痛白為虛冷嗽更須隨部用神工望聞問切醫者先之凡看病形指文聽聲察色其病圖載方册皮有薄厚但周時外嬰孩多在懷抱手無垢膩則指白皮嫩其紋顯而易見至三五歲者常貪戲耍手弄泥水則指粗皮厚其紋隱而難辨參諸面部是為捷要有紫黑而紋粗或叫怒而容變則倉卒難定必須聽聲有中風而迷悶或久患而昏沉語遲失音口瘡咽痛尤非聞而知之所能盡問證一節最為的當然幼幼方脈謂之啞科縱稍長成語不足信有飽曰譏癢曰痛如是類者屢嘗試之每究心及此初在父母審其得患之由而告醫者參詳則易於調治多有病家不肯自言其致疾之始末而一聽醫者之揣摩由是觀之問亦難矣必須診脈以決諸證然南北稟賦不同施治之法亦當隨其虛實冷熱用藥可也若夫造妙工夫初無其他大學所謂若保赤子心誠求之專是業者倘不盡此心之誠何以察不言之疾乎診脈明證小兒脈應二周前一指分關寸尺全六至號為無病子不和氣主按如弦浮洪風熱數驚候虛冷沉遲實積堅指滯脾經時緩應過猶不及亂難痊叔和脈經曰孩兒三歲至五歲呼吸須將八至看乃以八至為平及觀張氏脈訣云小兒常脈只多大人二至為平豫嘗指下審之果一息六至為平若七至八至乃是數脈主發熱作驚由此而論則脈之微妙不可不察學者當審而切之庶無錯誤凡把幼稚之脈僅二三歲者但以一指揣按關部側指於關前取寸口側指於關後取尺澤至四五歲余卻密下三指按三部明標本察病證然後可以克進退決安危蓋周歲以前氣血未完脈難依據周歲以後氣血和平始可診脈二歲以前只依一指按關部取法為率若弦緊主氣不和先與順之然後調中快氣浮洪主風熱先與解之然後疏風除熱急數主受驚先與發散然後鎮心退驚沉遲主虛冷先與溫之然後理虛去寒實滑主傷積先與表之然後疏滌積聚沉緩主宿冷滯脾錢氏脈訣云沉緩為積此又因宿冷積滯於脾則脾氣弱而不能磨化穀食遂成積也先與和解然後去積溫脾以上脈病皆宜對證調治有傳作乖異尤在臨機應變不可執一所謂醫者意也其有旨哉若一息十餘至為危急謂之太過一息僅二至為虛極謂之不及大小不同為惡候謂之亂皆難治也若年至十二三以上又當參諸大方脈以明得病之由因其所制之方以為治斯不誤矣議金銀薄荷薄荷湯內用金銀多為訛傳誤後人細讀明醫何氏論於中載述得其真古方所載金銀薄荷為湯使後人之醫者遂薄荷之外加以金鈈銀鈈同煎殊欠講明夫鈈者乃婦人常帶之物垢膩浸漬用以煎煮其味雜乎藥內大非所宜切須戒此昔明醫何澄論金銀薄荷乃金錢薄荷即今之家園薄荷葉小者是其葉似金錢花葉名曰金錢薄荷此理甚明非所謂再加金銀同煎大概錢字與銀字相近故訛以傳訛是亦魯魚亥豕之類也胎寒先後數詩雖曰繁紊誠為學者識證提綱孩兒百日胎寒候足曲難伸兩手倦音拳口冷腹膨身戰栗晝啼不已夜咨螿藏寒手兼足冷麵微青腹痛腸鳴泄瀉頻蓋為生時感寒濕夜多啼切日常輕胎熱三朝旬外月間兒目閉胞浮證可推常作呻吟煩躁起此為胎熱定無疑弄舌舒舌弄舌微微露即收得於病後最難瘳出長收緩名舒舌熱在心脾不用憂臍風風邪早受入臍中七日之間驗吉凶若見腹疼臍凸音迭起惡聲口撮是為風臍突嬰孩生下旬餘日臍突光浮非大疾穢水停中明所因徐徐用藥令消釋夜啼夜啼四證驚為一無淚見燈心熱煩面瑩夾青臍下痛睡中頓哭是神干急驚面紅卒中渾身熱唇黑牙關氣如絶目翻搐搦喉有痰此是急驚容易決天釣天釣元因積熱深延潮心絡又多驚雙眸翻上唇焦燥呵欠頻頻疾便生急驚後如瘧急驚之後傳如瘧外感風邪為氣虛略表次和脾與胃自然寒熱得消除慢驚陰盛陽虛病已深吐余瀉後睡揚睛神昏搐緩涎流甚此證分明是慢驚搐證搐證雖分急慢驚亦因氣鬱致昏沉良醫欲治宜寬氣氣順之時搐自停諸風毒諸風夾熱隱皮膚凝結難為陡音鬥頓除項頰腫須護喉舌內疏風熱外宜塗破血傷風跌撲皮膚因破損外風侵襲在傷痕隨時發腫微加痛活血疏風是要言傷積頭疼身熱腹微脹足冷神昏只愛眠因食所傷脾氣弱下宜遲緩表宜先驚積大府無時泄下青見人啾唧似生嗔解驚去積宜施劑立致精神起臥寧諸熱諸熱元初各有因對時發者是潮名乍來乍止為虛證晚作無寒屬骨蒸吐瀉脾虛胃弱病根源水穀如何運化行清濁相干成吐瀉久傳虛渴便風生傷寒傷寒之候有多般一概推詳便究難面目俱紅時噴嚏氣粗身熱是傷寒傷風惡風發熱頭應痛兩頰微紅鼻涕多汗出遍身兼咳嗽此傷風證易調和夾驚傷寒身微有熱生煩躁睡不安兮神不清此是夾驚感寒證亦須先表次寧心夾食傷寒鼻涕頭疼時吐逆面黃紅白變不一此因夾食又傷寒發表有功方下積下後傷風表而未盡遽宣通通後從而喘氣攻此是陽微陰弱證肺經再受有邪風夾風傷寒孩子傷寒又夾風目多眵淚臉腮紅太陽冷汗微生喘口水如涎滴滿胸風寒互證風寒雙中汗難通重下雄黃散是功得汗來時猶可治莫教不汗變張弓結胸傷寒大結胸兮小結胸水兼寒熱不雷同陽經下早留為毒用藥無非直達攻痞似結胸證同前證應無痛病在陰經下早虛邪毒結留心下滿此名痞氣膈中居壞證傷寒此病初傳不識機致令汗下失其宜邪乘虛入傷榮衛知犯何經急療之赤白痢小兒下痢細尋推不獨成於積所為冷熱數般雖各異寬腸調胃在明醫五色痢痢成五色豈堪聞日久傳來神氣昏干痛煩啼為最苦更防兒小命難存風痢風毒乘脾黃褐色看來其痢與驚同但聞不臭斯為異獨瀉脾經自有功腫證古今議腫是脾虛大抵多從濕熱為十種根因各調治詳分補瀉在臨機五疳五疳五臟五般看治法詳推事不難若見面黃肌肉瘦齒焦發豎即為疳走馬疳傷寒熱毒上熏蒸面色光浮氣喘生口臭齒焦腮有穴馬疳如此是真形脫肛肛門出露久難收再感風傷事可憂況自先傳脾胃弱更詳冷熱易為廖癇證驚傳三搐後成癇嚼沫牙關目上翻明辨陰陽參色脈不拘輕重總風痰瘧證夏傷於暑秋成瘧間日連朝不少差解表去邪須次第再宜養胃固脾家癖證本因積久成頑結男左女右居腹脅俗云龜癆不須聽化癖調脾自安帖諸疝諸疝元來各有名蓋因寒濕氣侵成治分芍藥烏梅散勻氣金鈴與五苓龜胸無端唇口忽然紅心肺因痰飲聚中風熱乘之加喘急形如覆掌號龜胸驚丹兒在胎時母受驚驚傳邪熱子傷神忽然赤片微微起涼解肌膚始見寧咳嗽咳嗽雖然分冷熱連聲因肺感風寒眼浮痰盛喉中響戲水多因汗未乾齁䶎孩兒齁䶎為啼時食以酸鹹又乳之或自肺經傷水濕風痰結聚早為醫瘡疹毒停在胃布諸經運氣變遷瘡疹生面口唇紅兼嗽渴腹疼中指冷分明豆瘡傳變黑陷瘡枯嗽失音瀉兼渴甚吐無停身涼食減多沉困更有痰多命必傾斑疹斑證總言因胃熱赤生黑死分明別忽如錦片出肌膚溫毒發時從兩脅陰囊腫厥陰少陰寒激搏致令腫縮宜溫藥光浮不痛作虛醫赤腫須憑涼劑卻驚癱鶴膝風濕流傳骨節間痛兼心悸是驚癱若於腕脛多疼重凝結成團鶴膝看瘰癧初發原於耳項旁證輕多謂是無妨因循作腫成膿後穿破名為瘰癧瘡五淋淋病雖然分五盅要明各類在詳看曰膏曰冷同其證血石均為熱一般腹痛大凡腹痛初非一不特癥瘕與痃癖分條析類證多端看取論中最詳悉丁奚久積成疳因失治肚高頸細變丁奚更兼手足如筒樣面白身黃汗不時哺露積傳疳後曰丁奚哺露因而又得之腹大青筋蟲滿肚吐頻瀉數急調脾口瘡心脾胃熱蒸於上舌白牙根肉腐傷口角承漿分兩處有瘡雖異治同方諸瘡滿頭及額生如癩但用連床得安瘥遍身糜潰更多煩一抹金塗無不快目疾生下經旬目見紅蓋因胎受熱兼風涼肝心藥斯為妙疝氣豆瘡宜別攻丹毒小兒氣弱肌膚薄熱毒乘虛來發作急須化毒與消風毒散風消始安樂重舌鵝口孩兒胎受諸邪熱熱壅三焦作重舌或成鵝口證堪憂用藥更須針刺裂五軟稟賦元虛髓不充六淫之氣易來攻頭兼手足身羸弱此證名為五軟同天柱倒忽然天柱倒何如此病皆因肝腎虛外有風邪容易襲故傳項軟不相隨解顱頭顱初見如開解腎弱元虛大可憂補腎調元是良藥投之不應定難瘳諸汗小兒自汗證多端切莫將為一例看要識陰陽虛實病勤勤調理自然安黃證身黃暑濕蒸脾得內外因分治最良更有胎傳生便見母宜多服地黃湯失血九道何為血妄行蓋因抑鬱熱邪生隨經施治明虛實氣順如常血自勻不內外因人身一或才傷損重則宜其血亦多不內外因然有自各分證治在專科小兒常安四時欲得小兒安常要一分飢與寒但願人皆依此法自然諸疾不相干上前詩訣言雖鄙俚所貴平易能記者得之於心應之於手何施不可參諸後論尤見詳備此特為初學之勉非敢立異於人也小兒專科賦以小兒專科要識形證為韻即前場屋中應舉八韻賦式細辨諸證難明小兒惟造理以達此於專科而見之傷風清涕交流初傳在肺夾食黃紋必見是屬居脾原夫七日之內臍痛乃多百晬之外骨蒸者少惟驚疳積熱半在攻裡故暑濕風寒先宜發表總謂十三科目各貴精專不拘長幼兒童均稱是小觀其得病嬰孺要參脈形雖痛癢難通於一問然重輕明察於諸經暴感邪氣腮頰微紫久因客忤山根太清勿問兒小但憑藥靈腎有證攻黑色多浮於地閣即承漿心為邪克赤紋獨露於天庭即額心茲蓋脈病證治審察要詳襁褓嬰孩變更莫測凡有疾苦全憑見識非業擅一門何以取效苟醫不三世徒然用力難同初學之妄議貴在專科之定式心肝恬淡自然毋染於時災脾胃和平戒以勿餐於夜食請言夫醫通仙道溥以生意家傳祕方及諸幼年參天地之化育無息少間免父母之憂懷有驚即痊雖用藥聖亦由業專然而見魚口兮氣弱殊甚聞雅聲兮命傾必然既危吐露以真實安有怨咨而妄傳表用疏通細述戴君之語藏明補瀉載稽錢氏之篇專者何精義無二全活孩提博學有諸在明機要是知小脈科兮嘗喜一藥多效大方科兮固有十形三療蓋進以乳食務要撙節而遠之鼓藥免生驚叫調和自小以無恙長大何憂於不肖春融一念普推活幼之誠日究千方庶盡及人之妙然嘗論形質始具夙有靈性語言未通是為啞科非圓機之士焉察彼證必精製之劑能除宿疴有信巫不用醫適以謬甚有是方不重藥尤其誤矣此病家自取過耳於醫者殊無奈何術顯咸陽扁鵲全嬰而有驗脈明晉代叔和及幼以無訛抑又聞㿠白虛盛神氣常昏紫黑實多聲音益勝陽證似陰脈按細緊陰證似陽脈來緩應然大學所謂若保赤子心誠求之此又在究心而觀證嘗謂為醫不易而幼幼之科尤不易也黃帝曰若吾不能察其幼小雖聖人猶難之況後學乎余雖不才謾成前賦以便學者觀形切脈之要臨病之際非特少資談柄亦可以發揮神聖工巧之妙豈不韙歟其或未然後之明者改而證諸幸莫大焉
