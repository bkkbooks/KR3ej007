body:
  text: 卷下信效方湯散門湯類日生湯治吐瀉痢後將傳慢驚慢脾神昏脈弱飲食不進睡露揚睛晝輕夜重急宜投解北南星一兩銼破瓦器盛東壁土同醋煮少時濾干切片焙人參去蘆冬瓜子仁上件㕮咀每服二錢水一盞半姜三片慢火煎七分候溫無時少與緩服投之急必吐此後應諸湯散丸劑所述服藥次序不過言其大略然煎煮調化分數湯使下法尤在臨時量兒大小以意加減或多或少隨病輕重用之余皆仿此再不繁引牛蒡湯主傷風發熱煩躁鼻塞氣喘痰嗽驚啼及諸瘡赤紫丹毒咽喉腫痛牛蒡子三兩略少研碎大黃一兩半防風去蘆薄荷去老梗二味各一兩荊芥去根老梗四兩甘草一兩一錢半上件㕮咀每服二錢水一盞煎七分無時溫服黃芩四物湯理諸瘡丹毒赤瘤燥癢黃芩一兩當歸酒洗生乾地黃赤芍藥川芎四味各半兩何首烏去粗皮草烏炮去皮玄參三味各一錢半甘草六錢薄荷葉二錢上件㕮咀每服二錢水一盞煎七分無時溫服耆歸湯治小兒稟賦素弱豆瘡出不快者及肝虛目視不明黃耆一兩蜜水塗炙當歸酒洗焙乾白芍藥川芎三味各半兩甘草三錢炙上件㕮咀每服二錢水一盞煎七分無時溫服枳實湯主傷風傷寒胸滿氣促咳嗽不活食多夾痰吐出枳實去瓤銼片麥麩炒微黃赤茯苓去皮二味各半兩甘草六錢半夏七錢湯煮透濾仍銼焙乾桔梗七錢半銼炒上件㕮咀每服二錢水一盞姜二片煎七分無時溫服小柴胡湯治傷寒溫病身熱惡風胸滿肋痛煩渴嘔噦小便不利大便秘硬能解表裡邪毒痰嗽氣喘柴胡去蘆二兩半夏如前制黃芩人參去蘆甘草四味各七錢半上件㕮咀每服二錢水一盞姜二片棗一枚煎七分無時溫服或去棗加薄荷同煎防己湯治感冒風濕之氣失於解表流注兩足疼痛至兩膝浮腫不能屈伸傳成癱瘓防己去黑皮麻黃去節存根功全表裡銼碎湯泡濾過焙乾薄桂去粗皮三味各半兩赤芍藥一兩赤茯苓去皮一兩蒼朮米泔水浸一宿去粗皮濾干銼片用火炒至微黃色一兩甘草炙七錢半上件㕮咀每服二錢水一盞姜二片蔥一根煎七分空心熱服或入薤白同煎防風湯治急驚後餘熱未退時復手足搐掣心悸不寧及風邪中入肺經兩目視入開眨不常防風去蘆川芎大黃白芷黃芩甘草六味各半兩細辛去葉二錢薄荷葉二錢半上件銼焙為末每服一錢用溫湯無時調服知母湯治齁䶎氣喘痰鳴發熱咳嗽惡風知母甘草二味各半兩貝母羌活滑石別研大黃小麥子五味各三錢麻黃如前制苦葶藶訶子肉三味各一錢半薄荷去梗二錢上件㕮咀每服二錢水一盞姜二片煎七分無時溫服白芍藥湯治冷疝腹痛及誤汗誤下即壞證傷寒是也並宜先服次投對證之劑白芍藥一兩半澤瀉去粗皮七錢半甘草三錢炙薄桂去粗皮一錢半上件㕮咀每服二錢水一盞煎七分空心溫服誤汗誤下加人參南木香各二錢臍下痛入生薑及鹽同煎加鉤藤亦好茯苓厚朴湯主傷寒傷風夾痰嘔逆並吐瀉後喉涎牽響飲食減少脾胃氣虛白茯苓去皮半夏如前制二味各七錢半甘草三錢炙厚朴五錢去粗皮銼碎每一斤用生薑一斤薄片切爛杵拌勻釀一宿慢火炒乾用上件㕮咀每服二錢水一盞半姜三片煎七分無時溫服或加棗一枚去核同煎茯神湯治心氣不足虛而驚悸日常煩哭及嬰孩生下羸瘦多驚宜子母同服自然有效茯神去皮木根一兩人參去蘆半兩甘草炙二錢當歸去蘆尾酒洗半兩上件㕮咀每服二錢水一盞煎七分無時溫服有微熱煩躁入麥門冬去心同煎守中湯理春夏相交陰濕氣重中傷脾胃致腹痛泄痢經久不止漸傳手足浮腫飲食少思桔梗去蘆銼炒蒼朮如前制二味各一兩白姜四錢炮甘草六錢炙上件銼焙為末每服一錢空心沸湯調服㕮咀水煎變可或用薑棗瀉肺湯即瀉白散主傷風后五心煩熱咳嗽喘促唇紅頰赤發渴引飲桑白皮銼炒地骨皮淨洗焙乾二味各二兩甘草炙三錢上件㕮咀每服二錢水一盞粳大米百粒煎七分食後臨臥溫服或不拘時五和湯主宣利臟腑積熱調和榮衛當歸酒洗赤茯苓去皮二味各半兩甘草炙大黃枳殼水浸潤去殼銼片麥麩炒微黃三味各七錢半上件㕮咀每服二錢水一盞煎七分無時溫服養臟湯主生津益氣溫腸止痢人參去蘆甘草炙二味各二錢半白芍藥白朮二味各半兩南木香肉桂去粗皮二味各一錢罌粟殼去蒂銼碎蜜水炒肉豆蔻訶子肉三味各一錢半上件㕮咀每服二錢水一盞姜二片棗一枚煎七分空心溫服或入倉米同煎貝母湯主百日內嬰孩咳嗽有痰貝母一兩甘草半炙半生二錢上件銼焙為末每服一字或半錢用陳大米煎湯空心調服痰盛淡薑湯調下固真湯主吐瀉痢後胃虛脾慢四肢口鼻寒冷沉困不省人事人參去蘆附子湯浸炮裂去皮白茯苓去皮白朮四味各二錢半山藥去黑皮黃耆蜜炮塗炙肉桂去粗皮甘草濕紙裹煨透四味各三錢上件㕮咀每服二錢水一盞姜三片棗一枚煎七分空心溫服或無時生地黃湯治胎黃乳母服嬰兒亦可少與含咽生乾地黃赤芍藥川芎當歸酒洗天花粉五味各半兩上件㕮咀每服二錢水一盞煎七分無時溫服姜橘湯治脾慢胃冷嘔吐不止白姜二錢炮陳橘皮去白一兩粉草炙三錢上件銼焙為末每服半錢或一錢用溫棗湯調化空心少與緩服理中湯主溫脾暖胃冷吐冷瀉及治氣虛中寒腹痛人參去蘆白朮二味各一兩乾薑炮粉草炙二味各錢半上件銼焙為末每服半錢或一錢用溫白湯空心調服桂枝湯治太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒翕翕發熱鼻嗚乾嘔者桂枝去粗皮芍藥二味各一兩半甘草一兩上件㕮咀每服二錢水一盞姜二片棗一枚煎七分不拘時溫服麻黃湯治傷寒頭疼發熱身痛無汗喘滿又治太陽病脈浮緊無汗發熱身痛八九日表證不解者麻黃去根節一兩半桂枝去粗皮一兩甘草半兩杏仁三十五粒湯泡去皮上件㕮咀每服二錢水一盞煎七分無時溫服獨活湯治驚癱鶴膝及中風濕日久致腰背手足疼痛晝輕夜重及四肢痿痹不仁川獨活黃色如兔眼者佳半兩當歸酒洗白朮黃耆蜜水塗炙薄桂去粗皮川牛膝酒洗五味各二錢半甘草炙三錢上件㕮咀每服二錢水一盞姜二片薤白一根煎七分空心熱服或無時五黃湯主解利遍身癰癤惡核發熱及丁黃腫毒丹瘤黃耆一兩生用黃連黃芩黃柏大黃四味各二錢半上件㕮咀每服二錢水一盞蜜一大匙煎七分無時溫服化毒湯解風熱上攻咽喉腫痛飲食不便桔梗銼炒半兩薄荷葉荊芥穗甘草三味各二錢半山豆根取淨皮一錢半牙硝硼砂朴硝雄黃硃砂五味各二錢上前五味焙為末後五味入乳缽細杵同前藥末一處再杵勻每用一字至半錢乾點舌上化下或以溫湯濃調少與含咽亦可青木香湯治小兒陰莖無故而腫或痛縮初因陽明經有風熱溫氣相傳所以如是法當寬此一經其證自愈蓋陽明受病不能養其宗筋故也宜服之及咳嗽痰喘氣促青木香去蘆枳殼如前制二味各半兩甘草二錢半上件㕮咀每服二錢水一盞煎六分無時溫服排風湯治中風狂言失音不語精神昏困驚癱鶴膝等證及腫疾才愈後偶感外風滿面遍體虛浮並宜可服白蘚皮白朮白芍藥薄桂去粗皮防風去蘆川芎當歸酒洗杏仁湯泡去皮尖甘草炙九味各半兩川獨活麻黃去根節白茯苓去皮三味各七錢半上件㕮咀每服二錢水一盞姜二片煎七分無時溫服中和湯此藥大能通和表裹溫養脾胃勻調氣血順正陰陽發散風寒闢除腥穢善使豆瘡易出易收不致倒靨黑陷傳變危急兼治遍身癰癤已潰未潰排膿止痛自然消釋常服清神駐顏明目健脾真元益固邪氣無干人參去蘆厚朴如前制當歸酒洗防風去蘆白芷肉桂去粗皮桔梗川芎白芍藥沉香檀香乳香藿香葉紫蘇葉黃耆蜜水塗炙甘草十六味各半兩上件㕮咀用無灰酒四兩重拌勻曬乾天陰略焙每服一錢水一盞煎七分無時溫服人參甘桔湯感冒風熱火氣熏逼豆瘡蘊毒上攻咽喉腫痛痰氣不順咳嗽失音飲食減少並宜治之人參去蘆半兩桔梗銼用蜜水浸透一兩甘草半生半炙三錢上件㕮咀每服二錢水一盞煎七分無時溫服風熱加荊芥杏仁煎豆瘡後目生翳膜用蟬殼淨洗去嘴足同煎咽痛人硼砂末煎去渣無時含咽人參芎歸湯治九道血妄行人參去蘆川芎當歸酒洗三味各半兩荊芥二錢半上件㕮咀每服二錢水一盞煎七分無時溫服五拗湯治感風濕及形寒飲冷痰嗽咳逆連聲不已麻黃不去根節杏仁不去皮尖荊芥不去梗桔梗四味各五錢用蜜水炒銼用甘草二錢半上件㕮咀每服二錢水一盞煎七分無時溫服六和湯治心脾不和氣不升降霍亂吐瀉咳嗽胸滿頭目疼痛嗜臥倦怠並陰陽不分冒暑伏熱煩悶成痢中酒作渴心逆畏食人參去蘆縮砂仁甘草炙杏仁湯泡去皮尖半夏如前制五味各一兩香薷厚朴如前制二味各四兩白扁豆炒熟銼去殼一斤用生薑一斤碎切爛煮拌勻釀經一宿焙乾藿香赤茯苓去皮木瓜各一兩上件㕮咀每服二錢水一盞姜二片棗一枚煎七分無時溫服或入鹽半字同煎黃耆六一湯治諸虛不足煩躁驚悸目揚身體軟弱不思飲食黃耆六兩蜜水塗炙甘草一兩炙上件㕮咀每服二錢水一盞刺二枚煎七分無時溫服真武湯治傷寒諸疾後表裡俱虛煩渴有熱遍身汗出白茯苓去皮白芍藥二味各七錢半白朮附子如前制二錢半上件㕮咀每服二錢水一盞姜二片煎七分無時溫服牡蠣大黃湯治三五歲小兒感受溫濕之氣侵襲膀胱致陰莖膚囊浮腫作痛牡蠣用熟黃泥包裹夾水煅透出地上候冷用大黃紙裹水浸透炮過候冷二味各一兩上件銼研為末每服一錢用無灰溫酒空心調服不能飲者溫湯調少入酒同服坎離湯治虛喘晝輕夜重食減神昏蓽澄茄石菖蒲二味各一錢白朮白茯苓去皮南木香三味各二錢甘草炙半夏如前制紫蘇子略炒杵碎三味各四錢上件㕮咀每服二錢水一盞煎七分無時溫服清脾湯治諸瘧久不瘥者脾胃虛弱形容憔悴厚朴如前制一兩烏梅打破去仁半夏如前制良薑銼用東壁土炒青皮去白四味各半兩甘草炙三錢草果炮去殼取仁二錢半上件㕮咀每服二錢水一盞姜二片煎七分未發前並三服仍忌生冷油膩時果毒物麥門冬湯解斑疹熱毒頭痛煩悶狂渴妄語麥門冬去心乾葛二味各三錢人參去蘆赤芍藥升麻赤茯苓去皮甘草五味各二錢石膏末五錢上件㕮咀每服二錢水一盞煎七分無時溫服化丹湯解利丹毒遍身燥癢發熱煩啼川獨活射音夜干麻黃如前制青木香甘草黃芩薄桂去粗皮石膏末八味各五錢上件㕮咀每服二錢水一盞煎七分無時溫服茴香湯和脾胃進飲食理腹痛散邪氣茴香炒良薑銼用東壁土炒二味各一兩半蒼朮如前制二兩甘草炙一兩上件銼焙為末每服一錢燒鹽湯空心調服大柴胡湯疏利風熱痰嗽腹脹及里證未解柴胡去蘆四兩黃芩芍藥二味各一兩半大黃半夏如前制二味各七錢半枳實如前制七錢甘草一兩小方故加用上件㕮咀每服二錢水一盞姜三片煎七分無時溫服快膈湯理胸膈不快飲食少進亦能順氣和中消導宿滯人參去蘆青皮去白縮砂仁烏藥良薑如前制香附子甘草炙七味各一兩上件銼碎為末每服一錢溫鹽湯空心調服升麻湯治時行瘟疫頭痛發熱肢體煩疼及瘡疹未見形先疑貳之間並宜可服大能和順血脈解諸餘毒斑證等疾升麻乾葛芍藥三味各一兩甘草半兩上件㕮咀每服二錢水一盞煎七分無時溫服小陷胸湯治六七歲以上之兒小結胸證半夏如前制一兩淨黃連栝蔞實各半兩上件㕮咀每服二錢水一盞半