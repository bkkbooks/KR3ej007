極細杵再同前五味藥末杵勻用粳大米飯包作棕子一大個小瓦瓶盛水熟煮候冷取出在沙缽中爛杵細布兜緊捻出如稠糊安在別器內以藥末亭分同杵細軟丸粟谷大取諸積每服十五丸或二十一丸至三十三丸並用淡薑湯泡冷飯取汁小盞五更初空心送下通利三五行以勻氣散止補治積吐有酸餿氣每服三丸至五丸用淡薑湯入米醋少許候溫空心投下香芎丸治諸淋證若患風閉尤效淨香附鹽水炒川芎赤茯苓去皮三味各半兩海金沙滑石二味各一兩枳殼如前制澤瀉去粗皮石葦去毛梗取薄葉檳榔不過火四味各二錢半上件銼曬為末糯米粉煮為清糊丸麻仁大每服三十三丸至五十五丸或七十七丸並用麥門冬熟水空心送下若小便澀痛滴三五點者取長江順流水用火微溫入鹽少許調勻空心咽服香連丸治赤白下痢煩渴作痛南木香半兩不過火淨黃連一兩銼用茱萸炒仍去葉梗烏梅肉二錢半薄切用屋瓦慢火焙乾上件為末用阿膠半兩銼碎炒脹水化如糊候冷入乳缽內同前藥末亭分杵勻丸作麻仁大赤痢每服三十三丸至五十五丸或七十七丸甘草湯空心下白痢丸數同前白薑湯空心下赤白交作溫米清湯空心咽服化癖丸主癖結氣塊在兩肋之間日久不化乍寒乍熱臟腑不調米穀不消哽氣喘促胸腹滿悶及理丁奚哺露南木香陳皮去白莪朮去毛炒三稜炮銼青皮巴豆九粒去殼膜心微炒枳殼如前制檳榔七味各半兩白朮丁香二味各二錢細墨燒存性用四錢上除木香檳榔丁香不過火餘七味焙同前三味為末麵糊丸作麻仁大每服十五丸至二十一丸清米湯空心下有寒熱往來以柴胡飲間服忌油膩生冷飲食蘆薈丸主五疳八痢蛇蟲臟腑虛弱身體瘦悴頭髮焦疏腹脹青筋小便白濁渴水無度洞泄不時穀食難化遍身瘡疥神色乾燥此藥大能養胃壯氣止痢除蟲長肌健力南木香丁香二味各二錢半訶子去核取肉肉豆蔻二味各半兩使君子肉蘆薈二味各四錢棗肉一兩薄切用屋瓦盛慢火焙乾上除使君子肉薄切於乳缽內極細杵仍將前南木香等四味濕麵裹煨至香熟取出地上候冷去面銼焙同棗肉蘆薈為細末再入乳缽同使君子肉杵勻煉蜜丸作麻仁大每服三十丸至五十丸溫米湯空心送下兒小米湯化服使君子丸治腹內諸蟲作痛口吐清水使君子肉薄切屋瓦焙乾檳榔酸石榴根皮東向者佳淨洗銼焙大黃半生半炮四味各七錢半上除檳榔銼曬不過火餘三味再焙同檳榔為末沙糖水煮麵糊丸麻仁大每服三十丸至五十丸淡豬肉汁空心下或雞肉汁亦好補腎地黃丸治稟賦不足腎氣虛弱骨髓枯竭囟大頭縫不合體瘦語遲行步多艱齒生緩者乾山藥去黑皮山茱萸酒浸潤蒸透去核取皮為用熟乾地黃酒洗焙乾三味各五錢鹿茸蜜塗炒酒亦好川牛膝酒洗焙二味各四錢牡丹根皮淨洗白茯苓去皮二味各三錢澤瀉去粗皮二錢上件銼焙為末煉蜜丸作麻仁大每服十五丸或二十五丸至三十五丸空心溫鹽湯下溫酒亦佳寬腸丸治痢后里急大府閉澀不通枳殼同上制仍用清油浸透一宿焙乾五錢麻仁去殼木通去皮節大黃半生半炮檳榔大腹皮淨洗焙乾五味各二錢半上除麻仁用乳缽極細杵外五味檳榔不過火余焙同研成末入乳缽中與麻仁再杵勻煉蜜丸綠豆大每服三十丸至五十丸仍以枳殼甘草煎湯空心送下一二月嬰孩溫蜜湯化服香陸胃苓丸治腫疾日久不愈此藥大能實脾導水多服取效丁香去梗商陸赤小豆陳皮去白甘草炙五味各二兩蒼朮如前制三兩澤瀉去粗皮二兩半赤茯苓去皮豬苓去皮白朮三味各一兩半肉桂去粗皮一兩厚朴同上制二兩上除丁香肉桂不過火余藥銼焙同前二味為末用面微炒水浸透煮糊丸綠豆大每服二十丸至五十丸或七十丸空心溫湯下兒小者丸作粟谷大吞服粒數引子並如前法二姜丸治瘧疾往來寒熱經及不愈者良薑一兩銼片東壁土炒白姜一兩銼片巴豆九粒去殼同炒微黃去巴豆上為細末用獖豬膽汁和水煮麵糊丸麻仁大就帶潤以硃砂末為衣熱多用溫湯早晨面北空心送下寒多亦於清旦用溫酒面南空心咽服若寒熱相亭用陰陽湯以一半冷水一半熱湯參和是也不拘向南北投服沒石子丸治久患疳痢及釀瀉沒石子二枚南木香濕紙包略炮過肉豆蔻一枚炮淨黃連銼碎薑汁炒過二味各二錢半訶子四枚炮去核上銼焙成末如烏犀丸內製飯糊為丸粟谷大每服十五丸至三十丸或五十丸溫白湯空心下或米清湯半夏丸治痰證神妙若驚搐後風涎潮作服之尤驗半夏生用二兩赤茯苓去皮枳殼同上制二味各一兩風化朴硝二錢半上前三味銼焙為末入乳缽同朴硝杵勻用生薑自然汁煮糯米粉為糊丸綠豆大每服三十丸至五十丸仍以淡薑湯食後臨睡送下兒小者丸如粟谷大六聖丸治諸積和胃大能主氣厚腸消疳快膈屢用取效莪朮炮銼淨黃連陳皮去白白姜炮四味各五錢南木香二錢半上除南木香不見火餘四味銼焙同木香為末每一錢重巴豆三粒去殼膜心存油碎切入乳缽極細杵同前藥末再拌勻煮醋麵糊丸麻仁大每服十五丸至二十五丸或三十五丸淡薑湯五更初空心送下利三五行勻氣散止補常服助脾化積進食消疳臨睡以淨湯或溫酒下三粒及五粒而已每一次止丸藥末三錢重淨巴豆九粒為則不可多合久則味過用之效遲內消丸治瘰癧作膿穿破久不愈者或初得此證投之亦效斑蝥一兩除翅足粟米大盞炒令粟米微焦色仍去粟米上件入薄荷葉三兩同研為末雞子清為丸綠豆大初用半飢半飽間以溫茶清下一丸逐日加一丸加至五丸之外又逐日減一丸減至一丸之後每一日只服五丸得瘥即止不可過投截驚丸治驚風搐掣煩躁有熱兩目上視口噤牙關龍膽草去蘆防風去蘆青黛鉤藤和鉤淨黃連牛黃甘草硃砂末水飛者八味各五錢薄荷葉二錢半麝香半錢上除牛黃麝香外餘八味銼曬或焙為末仍同前二味乳缽內杵勻煉蜜丸芡實大每用一丸至二丸溫湯化服或茶清散氣丸理諸疝氣小便利或不通臍下作痛不堪忍者海藻湯浸洗七次焙乾用澤瀉去粗皮茴香炒車前子焙蘿蔔子用屋瓦慢火焙乾川楝子取肉斑蝥九枚去翅足同炒少時仍去斑蝥候冷用大腹皮淨洗焙乾七味各一兩上件銼焙為末酒煮麵糊丸綠豆大每服三十丸至五十丸南木香煎酒空心下或防風牡丹皮煎酒下不能飲者於木香湯中防風牡丹皮湯內各少入酒並空心投亦可再用鹽炒茴香煎湯尤妙金粟丸治下痢赤白水穀不化淨黃連一兩神麯一兩別研為末作糊川芎枳殼如前制穀芽淨洗焙乾赤茯苓去皮白芷南木香六味各半兩上除木香別銼不過火餘六味焙入木香同為末用神麯末煮糊丸粟谷大每服七十丸至百丸空心溫米清湯下不拘時萬應丸治諸般疳證胃口有熱飲食不進頭髮作穗面色痿黃五倍子去內蟲屑胡黃連青皮去白陳皮去白黃柏神麯麥芽淨洗焙乾三稜炮銼莪朮炮銼蕪荑檳榔龍膽草川楝子肉使君子肉十四味各一兩上除檳榔不過火麥芽二味外餘十二味銼碎炒令微焦色候冷同前麥芽檳榔研為細末水煮麵糊丸麻仁大每服三十丸至五十丸或七十丸溫米清湯無時送下或空心兒小者丸作粟谷大粒數下法同前金茱丸治冷疝氣痛及膚囊浮腫金鈴子肉一兩家茱萸半兩上二味焙研為末酒煮麵糊丸麻仁大每服三十丸至五十丸空心溫鹽湯下溫酒亦好兒小者丸作粟谷大粒數下法如前二聖丸治腹內諸蟲及消穀逐水下氣去風檳榔一兩巴豆十五粒去殼膜內存油上檳榔銼曬為末巴豆碎切在乳缽內極細杵仍入檳榔末同再杵勻麵糊丸綠豆大每服七十七丸至九十九丸用溫茶清五更初空心止投一服見蟲下盡進以稀粥自安商陸丸治水腫小便不通勿拘遠近商陸一兩淨黃連半兩上二味焙為末薑汁煮麵糊丸綠豆大每服三十丸至五十丸用溫紫蘇熟水空心下或溫蔥湯枳殼丸治大府虛閉氣連日不通痢后里急用之亦效利小便熱閉枳殼不拘多少銼片麥麵炒過仍以清油潤透一宿焙乾上焙為末煉蜜丸作芡實大兒小者用甘草糯米煎湯化下一丸至二丸兒大者丸綠豆大每服三十丸或五十丸食前溫米清湯送下小府熱閉用車前子煎湯候溫空心投之浚川丸治水腫及單腹滿脹氣促食減遍身面浮大戟芫花醋炒沉香檀香南木香檳榔莪朮大腹皮焙乾淨洗桑白皮銼炒九味各半兩黑白牽牛曬研取生末一兩巴豆去殼膜心存油三十五粒上除牽牛末巴豆外前九味內有沉香檀香木香檳榔不過火餘五味焙乾同沉香等為末就加牽牛末和勻巴豆碎切在乳缽內極細杵入前藥末同再杵勻水煮麵糊丸麻仁大每服十七丸濃煎蔥湯候溫五更初空心下去水未盡停一日減用十三丸次減作九丸再減至七丸湯使下法如前證退即止仍投南星腹皮散如單腹腫甚能飲食氣壯者加甘遂末同丸取效仍忌有甘草草藥餌不致相反三聖丸治諸瘧不拘遠近穿山甲一兩半湯浸透取甲銼碎同熱灰鐺內慢火炒令焦黃色雞骨常山雞心檳榔二味各一兩薄銼曬乾上件再曬為末水煮糯米粉為糊丸綠豆大就帶潤以紅丹為衣陰乾每服三十丸至五十丸未發前隔晚用酒空心投一服重則二服經久不瘥下祛瘧丹莪朮丸和脾益胃消進飲食寬膈快氣悅色清神莪朮炮銼三稜炮銼淨香附三味各四兩醇醋浸一七慢火煮乾再焙檳榔一兩薄銼生牽牛末一兩另研青木香去蘆穀芽淨洗焙乾青皮去白三味各半兩蓽澄茄丁香南木香三味各四錢上除檳榔丁香木香不過火及牽牛末餘七味銼焙仍同檳榔丁香木香為末余臨入牽牛末和勻水煮麵糊丸綠豆大每服三十丸至五十丸無時用淡薑湯下溫茶溫酒皆好兒小者丸粟米大粒數下法如前豆蔻丸治患豆瘡脾虛作瀉肉豆蔻南木香縮砂仁三味各三錢白龍骨訶子肉二味各五錢赤石脂枯白礬二味各七錢半上除木香不過火餘六味銼焙仍同木香為末稠煮麵糊丸麻仁大每服三十丸至五十丸溫米清湯空心送下或不拘時兒小者丸粟谷大下法同前碧玉丸治痰嗽氣喘胸滿飲食減少睡不得寧煩躁有熱青黛明白礬生用南星生用滑石四味各二錢半輕粉五十帖全蠍十五尾去尖毒巴豆四十九粒去殼膜心存油碎切入乳缽極細杵上除輕粉巴豆外餘五味或曬或焙為末仍入前二味同在乳缽杵勻薑汁煮糯米粉為糊丸粟谷大每服七丸至九丸或十一丸用淡薑湯空心投熱甚者薄荷湯下或不拘時快活丸治丁奚疳證皮膚瘦削骨露如柴肚大青筋小便白濁睡臥煩躁神氣昏沉常服健脾化積進食肥肌蒸餅一兩去頂剜空入青礬內半錢重仍以碎餅屑緊塞上用水紙封定灰火中炮透取出候冷用上件銼焙為末別以肥棗用米泔水浸經一宿飯上蒸少時去皮核用乳缽爛杵如糊同前餅末亭分再杵勻丸麻仁大每服三十丸至五十丸溫米精湯無時送下兒小者亦以米湯化服其蒸餅不拘個數大約以一兩入青礬半錢重為定下常如前法制半斤作一料後人切勿以見方不重藥為誤余當屢試屢驗其餅如南饅頭樣者沉香檳榔丸和脾助胃進食清神寬胸快膈順氣調中悅顏色壯筋骨理面帶痿黃肌膚瘦弱過食生果停寒在裡乳癖腹脹作痛及吐痢瘧腫瘥後諸疳蟲積並皆可投沉香檳榔檀香南木香丁皮三稜炮銼莪朮炮銼神麯炒穀芽洗焙厚朴同上制蒼朮同上制使君子肉銼以屋瓦焙乾青皮去白陳皮去白縮砂仁益智仁淨香附枳殼同上制良薑同上制十九味各半兩粉草炙一兩半上除沉香檳榔檀香木香丁皮不過火餘十五味銼焙仍同沉香等為末水煮麵糊丸麻仁大每服三十丸至五十丸溫米清湯無時送下兒小者不能吞嚥煉蜜丸如芡實大每以一丸或二丸溫湯化服膏類硃砂膏五心煩熱喉痰壅盛驚風搐搦渴飲無時睡中不寧見人煩躁口瘡糜爛硃砂水飛五錢牙消硼砂玄明粉三味各二錢半麝香一字金箔銀箔各十五貼白附子枳殼如前制二味各三錢川芎粉草二味各四錢人參去蘆黃芩薄荷葉三味各二錢上前七味入乳缽杵勻後七味銼焙為末仍入缽中同前藥和煉蜜丸芡實大每服一丸至二丸用麥門冬熟水無時化服如意膏治痰喘氣促咳嗽連聲不已冷熱二證皆可投半夏炮裂南星炮裂二味各一兩半上二味為末以生薑汁和勻捻作小餅如錢樣用慢火炙乾再為末復取薑汁如前經兩次炙乾仍焙為末煉蜜丸芡實大每服一丸至二丸仍用姜蜜湯無時化服有熱以薄荷湯地黃膏治口內舌上生瘡作痛飲食艱進晝夜煩啼山梔仁綠豆粉二味各一兩半粉草六錢上件或曬或焙為末用生地黃爛杵取汁一兩半好蜜一兩半以薄瓦器盛在銅鐵銚中水煮成膏如稀糊相似候冷亭分入前藥末同在乳缽再杵勻丸芡實大每以一丸至二丸麥門冬熟水無時化服兒大者每用一丸納口內含化或以新汲水調點舌上烏梅膏治諸渴不止吐瀉後口乾無味及病中昏悶咽痛不利心悸似驚此藥品味不寒不燥用得其宜暑月出路含化則津液生而煩渴少神效異常人參去蘆檀香銼曬薄荷葉三味各半兩烏梅肉薄切用屋瓦慢火焙乾乾葛縮砂仁百藥煎粉草五味各一兩上除檀香不過火烏梅肉別焙餘六味或曬或焙仍同前二味研為細末煉蜜丸芡實大每服一丸或二丸無時含咽兒小者麥門冬熟水化服烏附膏理囪門陷綿川烏生用綿附子生用二味各五錢雄黃二錢上件為末用生蔥和根葉細切爛杵入前藥末同煎空心作成膏貼陷處烏豉膏治六七歲以上小兒痄腮腫毒牙關緊硬飲食不便綿川烏水浸潤炮裂去皮臍半兩玄明粉二錢淡豆豉三錢重水浸潤飯上蒸透上以川烏為末同蒸豆豉玄明粉在乳缽爛杵為膏丸芡實大每用一丸兒大者安在牙關內今其自化和痰吐出又再如前法含化腫毒自消兒小者用薄荷蜜湯化開以指頭抹入牙關內嚥下亦不妨闢塵膏治小兒塵埃入目揩成腫熱作痛啼哭不已油煙細墨上以煙墨新汲井水濃磨入玄明粉半錢和勻為膏用筆多點目內三五次即效仍忌飲酒一晝宵萆麻膏治暴患脫肛萆麻子一兩上件爛杵為膏捻作餅子兩指寬大貼囟上如陰證脫肛加生附子末蔥蒜同研作膏依前法貼之鉤藤膏治百日內嬰孩唇面青冷腹痛夜啼及周歲以上者盤腸內吊諸疝氣疾鉤藤和鉤玄胡索當歸酒洗粉草炙乳香五味各五錢肉桂去粗皮二錢麝香一字上前四味焙乾桂不過火同為末乳香蒻葉里熨斗盛火熨透候冷入乳缽同麝細杵後入前藥末再杵勻煉蜜丸芡實大每用一丸至二丸白湯空心化服黃連膏治時行火眼赤腫澀痛晝夜煩啼淨黃連二錢半上件細銼雞子一枚筋嘴札開一頭大處取清瓦盞盛入黃連和勻釀一時見黃色以絹濾過成膏患者仰面臥外令人挑一字許頻點目內覺口中有苦味滿舌上藥之驗也豆瘡餘毒攻眼眵多有熱用之亦驗益中膏一名助胃膏治脾胃虛弱吐瀉腹脹肚疼困倦有因感冷而瀉夜起頻數大便過時食不克化肉豆蔻丁香縮砂仁訶子肉炮去核四味各二錢半粉草炙青皮去白二味各半兩陳皮去白一兩馬芹淨洗焙乾三錢上除丁香不過火餘七味焙仍同丁香為末煉蜜丸芡實大每用一丸至二丸白湯空心化服玄霜膏治一切湯火瘡但敷上痛止更無瘢痕好糯米五升或不拘多少上用堅硬鐵器盛貯見天處以雪水浸一二月不問腐爛仍用竹器撈出於大筲箕內別取淨水淋過曬乾焦炒研為細末新汲井水調塗患處如干燥又以軟雞翎蘸水添拂瘡上使之滋潤痛減藥少再添用自然效速末久成圍再研細一名玄霜散炒透黑色煙清為度清涼膏治暴赤火眼腫痛及血癤作疼發熱大黃淨黃連黃柏赤葛細辛和葉薄荷葉風化朴硝七味各一兩上前六味或曬或焙為末臨入朴硝乳缽內同杵勻每用一錢至二錢冷水加薑汁調塗太陽或新汲井水調妙熱癤以涼米湯水調搽患處祛風膏治急慢驚搐臍風撮口牙關緊閉痰涎壅盛咽喉腫痛威靈仙去蘆一兩半細銼焙研為末上用皂莢三兩去皮弦捶損挪溫水一碗絹濾過慢火熬若稀糊入醇醋半兩再熬三五沸去火候冷用前藥末亭分乳缽內杵勻丸芡實大先用鹽梅肉擦牙根次以此膏一丸或二丸溫白湯濃調抹入左上牙關內即開續進別藥熬時得瓦器為上銀器尤佳及解風痰壅盛淡薑湯調化無時少與含咽咽喉腫痛溫茶清調下或薄荷湯千金膏治水瀉疳瀉下痢赤白腹痛煩渴橡斗子一兩細茶白姜甘草三味各二錢半白芷五錢上件銼焙為末煉蜜丸芡實大每服二丸至三丸溫米清湯空心化下入醋與蜜相亭為膏尤妙湯溫化服丹飲門丹類水晶丹治驚積食積蟲積腹脹煩啼噁心食減面黃並宜通利此藥有頑積驚重風緊涎多熱極乃可服非常用之劑及急驚後風痰未盡免生凝疾宜再投南星銼作小塊湯煮少時半夏如前制二味各三錢滑石四錢輕粉五十帖淨蕪荑二百片巴豆五十粒去殼全者湯泡七次又去心膜作二邊水煮少時曬乾碎切上前三味焙為末拌和輕粉外蕪荑仁巴豆二味同碎切在乳缽內細杵入前藥末再杵勻如烏犀丸內製麵糊丸麻仁大每服十五丸至二十五丸或三十五丸糯米湯泡蔥白取汁小盞五更初空心下過三五行進勻氣散調補下風痰用淡薑湯空心服不驚丹治因驚氣而吐逆作搐痰涎壅塞手足掣縮目睛斜視常服疏風順氣自不作驚和脾胃進飲食枳殼同上制一兩淡豆豉焙乾茯神去皮木根南星同上制三味各半兩蠍梢五十尾去尖毒淨蕪荑二錢半先入乳缽內極細研爛上除蕪荑外餘五味焙為末再同蕪荑乳缽內杵勻醋煮糯米粉糊為丸周歲內嬰孩粟谷大每服三十丸至五十丸乳汁下三歲以上者麻仁大每服五十丸及六十丸溫米清湯下候一時得吃乳食鶴頂丹治陰陽二證結胸神妙勝陷胸承氣瀉心三藥明白礬一兩真銀硃半兩上二味同研為末用熨斗盛少炭火坐小瓦盞在上平抄礬朱末一錢入盞中熔化急刮出就搓成丸如有前證每用一丸研細茶清調勻溫服或入薑汁少許同炒下聽心上有隱隱微聲結者自散不動臟腑不傷真氣無問虛實證皆可投白礬能化痰解毒銀硃是水銀或硫黃煉成汁專破積聚故治結胸黑虎丹治諸般風證草烏去黑皮只一兩生用川烏去黑皮生用甘草二味各七錢半麻黃不去根節甘松熟乾地黃淨洗藿香葉白芷油煙墨燒存性豬牙皂莢川芎當歸何首烏南星生用殭蠶去絲赤小豆羌活白膠香木鱉子去油十六味各半兩上件銼碎或焙或曬研為細末糯米粉煮糊丸麻仁大每服三十丸至五十丸或七十丸稍空心用淡薑湯下兒小者丸作粟谷大治法如前祛暑丹治小兒暑月五心煩熱睡臥不穩無時嗞螿及小便少乳食減渴飲水漿硃砂末水飛三錢黃芩末甘草末二味各半兩五苓散末二兩上件和勻煉蜜丸芡實大每服一丸至二丸麥門冬熟水無時化服臨睡時投亦佳四神丹治水瀉赤白痢淨黃連一兩三錢黃柏去粗皮七錢白姜當歸酒洗焙乾二味各七錢半上四味薄銼或曬或焙為末用烏犀丸內製飯糊丸麻仁大每服三十丸至五十丸烏梅煎湯空心下其他病證多好甘甜咸美惟瀉痢惡之專喜酸苦澀淡為上故以烏梅作湯使兒小者丸粟谷大下法同前祛瘧丹治瘧疾經久不瘥常山二兩細銼烏梅和核一兩薄切紅丹半兩上除烏梅屋瓦別焙常山或曬或焙仍同烏梅紅丹研為細末糯米粉煮糊丸麻仁大每服三十丸至五十丸未發前涼酒空心送下或隔晚酒下重則二服輕則一服忌雞面羊生冷飲食毒物飲類百傷飲主百物所傷感冒風寒邪氣不拘冷熱二證並宜可服惟慢驚慢脾不用乾葛三兩淨香附二兩升麻淨洗青皮去白陳皮去白穀芽淨洗焙乾麥芽淨洗焙乾桔梗銼炒紫蘇和根縮砂仁甘草神麯炒赤芍藥十一味各一兩麻黃同上制枳殼同上制二味各七錢半上件㕮咀每服二錢水一盞煎七分無時溫服或入薑蔥同煎有積加水酒曲熱多添燈心竹葉煎投速效飲治長成小兒因他物或跌著觸損兩目血脹腫痛荊芥穗薄荷葉二味各半兩草決明一兩微炒甘草三錢生用上為粗末和半生半炒芝麻等分炒二錢在掌中盛以干吃咀嚼味盡吐去渣如此法投三五次即效柴胡飲治骨蒸疳氣五心煩熱日晡轉盛口乾無味渴多身瘦胸滿痰緊小便黃色食減神昏北柴胡去蘆淨洗人參去蘆當歸酒洗黃芩赤芍藥甘草炙六味各一兩大黃生用桔梗去蘆銼炒北五味去梗半夏同上制四味各半兩上件㕮咀每服二錢水一盞烏梅小角姜二片煎七分無時溫服四順飲治血脈壅實臟腑生熱頰赤煩躁四肢驚掣及因乳哺過傷寒暄失理令兒腸胃不調蘊蓄積滯並風熱結核頭面多生瘡癤目赤咽痛當歸酒洗二兩大黃一兩半赤芍藥三兩甘草一兩上件銼焙為末每服一錢湯調溫服不拘時清肺飲治肺受風邪客熱嗽聲不斷氣促喘悶痰壅鼻塞流涕失音及解時行疹毒豆瘡涎多咳嗽咽痛煩渴人參去蘆半兩柴胡淨洗二兩杏仁湯泡去皮尖桔梗銼炒赤芍藥荊芥枳殼同前制桑白皮銼炒北五味麻黃同前制半夏同前制九味各一兩旋覆花五錢甘草一兩半上件㕮咀每服二錢水一盞姜二片蔥一根煎七分無時溫服或入薄荷同煎沖和飲治感冒風寒頭疼發熱肩背拘急噁心嘔吐腹痛膨脹兼寒濕相搏四肢拘急冷氣侵襲腰足疼痛蒼朮同上制一兩二錢人參去蘆前胡去蘆桔梗銼炒三味各五錢枳殼同上制麻黃同上制陳皮去白三味各三錢川芎白芷半夏同上制當歸酒洗薄桂去粗皮白芍藥赤茯苓去皮七味各一錢半乾薑厚朴同上制二味各二錢甘草炙七錢半上件㕮咀每服二錢水一盞姜二片蔥一根煎七分無時溫服傷冷噁心嘔吐煨姜同煎開胃進食加棗子煎空心溫投寒疝痛入鹽炒茱萸茴香同煎明目飲治心脾蘊熱肝受風邪致兩目羞明經久不愈山梔仁淨香附二味各一兩夏枯草去梗半兩上件㕮咀每服二錢水一盞蜜大匙煎七分無時溫服玉露飲治頰赤咽乾心煩躁睡不穩身熱頭痛兼中暑發渴昏悶小便不通驚氣入腎夢中咬牙加金珠散薄荷湯空心溫服寒水石中有細紋以手可碎者是石膏潔白堅硬而有牆壁者是二味各一兩重甘草三錢曬乾天陰火焙上除前二味外甘草銼曬或焙同為細末每服半錢至一錢溫湯無時調服或麥門冬熟水寬氣飲主通利關節除胸膈痞結消痰逐水進美飲食及治蓄氣而成搐傳變急慢驚風氣逆不和精神昏倦枳殼同上制枳實同上制二味各一兩人參去蘆甘草炙二味各半兩上件銼焙為末每服半錢至一錢淨湯無時調服驚風痰搐加薑汁蔥湯同調熱極者入寬熱飲薄荷蜜湯調下或麥門冬湯綠豆飲解誤服熱劑煩躁悶亂或作吐或狂渴宜先投之次服對證藥劑綠豆粉一兩淨黃連乾葛甘草三味各半兩上除綠豆粉外餘三味或曬或焙為末入乳缽同綠豆粉杵勻每服半錢至一錢溫豉湯調服寬熱飲主伏熱在裡風痰壅滿氣促昏悶或脾胃停滯日久飲食減少面黃脈實發熱無時並宜可服枳殼去瓤一兩銼片巴豆十五粒作二邊去膜心同炒枳殼見微黃色去巴豆片大黃一兩粉草七錢半玄明粉二錢半上前三味銼焙為末臨入玄明粉乳缽內同前藥末杵勻每服半錢至一錢兒小者抄一字並用姜蜜湯無時調服或