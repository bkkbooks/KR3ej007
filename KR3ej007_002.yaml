body:
  text: 卷中明本論胎寒孩兒初生百日內覺口冷腹痛身起寒粟時發戰栗由足握拳晝夜啼哭不已或口禁不開名曰胎寒其證在胎時母因腹痛而致産經云胎寒多腹痛亦有産婦喜淡甘肥生冷時果皆致胎寒或胎前外感風寒暑濕治以涼藥內傷胎氣則孩兒生後昏昏多睡間或哯乳瀉白若不早治必成慢驚慢脾凡有此候宜以沖和飲當歸散合和水煨薑煎服使之微泄泄行進勻氣散調補泄止氣勻神安痛定手足舒伸次用參苓白朮散以養胃氣白芍湯去其寒濕乳母宜節生冷飲食庶漸瘥也又有手足稍冷唇面微青額上汗出不願乳飲至夜多啼頗似前證但無口冷寒戰名曰藏寒其疾夜重日輕腹痛腸鳴泄瀉青水間有不瀉者此證亦在百日內有之皆因臨産在地稍及冷氣侵逼或以涼水參湯洗兒或斷臍帶短而又結縛不緊為寒氣所傷如此宜以白芍藥湯及沖和飲加鹽炒茴香茱萸水薑煎投並乳母同服胎熱嬰兒生下三朝旬月之間目閉而赤眼胞浮腫常作呻吟或啼叫不已時復驚煩遍體壯熱小便黃色此因在胎母受時氣邪毒或外感風熱誤服湯劑或食五辛薑面過多致令熱蘊於內熏蒸胎氣生下故有此證名曰胎熱所謂胎熱即多驚若經久不治則鵝口重舌木舌赤紫丹瘤自此而生先以木通散煎與母服使入於乳兒飲之通心氣解煩熱然後以四聖散溫洗兩目目開進地黃膏天竺黃散及牛蒡湯當歸散亦令母服使從乳過是一助也乳母宜忌雞酒羊面庶得易安不致反復又有一證如前證元無大病而遽然弄舌者但身熱而四肢冷唇青色此脾胃不和所致宜服守胃散自愈有弄舌出於大病後舌略出不長一動即收此是惡候以錢氏白朮散治之不愈將傳危急舒舌者此脫著衣服不常外感風熱入於心脾蓋脾之脈絡繫於舌故時復舒捲出長收緩或渴或不渴謂之舒舌宜瀉心脾經之熱用瀉黃散加黃芩水煎服但不可以大寒之劑攻之熱退則寒起傳作他證切宜謹之臍風撮口嬰孩始生一七之內腹肚脹硬臍畔四圍浮腫口撮牙關不開攢眉而叫名臍風證乃因剪臍帶短或結縛不緊致外風侵入臍中或用鐵器斷臍為冷所侵或牽動臍帶水入生瘡客風乘虛而入傳之於心蘊蓄其邪復傳脾絡致舌強唇青手足微搐口噤不能進乳啼聲似啞喉中痰涎潮響是其候也此證多致不救若一匕之外先投劫風膏次以五苓散加寬氣飲入薑汁蔥白燈心煎湯調服與解風痰及用一字金煎荊芥湯或薄荷湯調抹口內證輕即快如稟賦充實發熱有痰驚搐投黑白飲溫蜜湯空心調下微泄似茶褐色二三行進白芍藥湯水薑棗煎服常用此法亦效若臍凸音迭肚緊微有青色口撮不開肝風盛而脾土受制不可施治凡有此候百無一活縱使得安亦非長壽一法用之間有驗者孩兒牙根肉上有小泡如粟米狀用溫湯蘸舊絹裹手指輕輕擦破即口開舌軟不藥自愈有臍突一證又非臍風此亦因初生洗浴系臍不緊穢水侵入於內産後旬日外臍忽光浮如吹捻動微響間或驚悸作啼治用白芍藥湯加薏苡仁水煎空心溫服次以外消散塗貼自然平復夜啼夜啼者有驚熱夜啼有心熱夜啼有寒疝夜啼有誤觸神祗夜啼此四者詳具於後驚熱者為衣衾之厚或抱於極暖處久坐致生煩悶邪熱攻心心主神神亂則驚心與小腸為表裡故啼泣而遺溺者是也治法遏熱鎮心則自安矣用百解散牛蒡湯三解散主之心熱者見燈愈啼面紅多淚無燈則稍息蓋火者陽物也心熱遇火兩陽相搏才有燈而啼甚故經曰火疾風生乃能雨此其義也宜涼心安神用百解散或五苓散加黃芩甘草水煎服次牛蒡湯三解散及琥珀抱龍丸為治有遇黃昏後至更盡時哭多睡少有啼聲不已直到天明乃胎中受寒遇夜則陰勝而陽微故腰曲額汗眼中無淚面瑩白而夾青伏臥而啼入盤腸內吊之證名為寒疝治法去宿冷溫下焦白芍藥湯烏梅散及沖和飲加鹽炒茱萸茴香水薑煎服及鉤藤膏亦佳誤觸神祗者面色紫黑氣鬱如怒叫時若有恐懼及睡中驚惕兩手抱母大哭不休此誤觸禁忌神祗而得或因惡祟所侵蓋嬰孩目有所睹口不能言但驚哭無時指紋俱隱故玉環集云忽然兩手形無見定知唐突惡神靈治法先解其表宜百解散次驅邪鎮心用蘇合香丸琥珀抱龍丸投之自效急驚急驚之論前代書所不載惟曰陽癇大概失所愛護或抱於當風或近於熱地晝則食多辛辣夜則衾蓋太厚鬱蒸邪熱積於心傳於肝再受人物驚觸或跌撲叫呼雷聲鼓樂雞鳴犬吠一切所驚未發之時夜臥不穩困中或笑或哭齧五結切齒咬五巧切乳鼻額有汗氣促痰喘忽爾悶絶目直上視牙關緊急口噤不開手足搐掣此熱甚而然況兼面紅脈數可辨蓋心有熱而肝有風二臟乃陽中之陽心火也肝風也風火陽物也風主乎動火得風則煙焰起此五行之造化二陽相豉風火相搏肝藏魄心藏神因熱則神魂易動故發驚也心主乎神獨不受觸遇有驚則發熱熱極生風故能成搐名曰急驚治之之法先以五苓散加黃芩甘草水煎或百解散發表次通心氣木通散三解散疏滌肝經安魂退熱牛蒡湯防風湯主之驚風既除之後輕者投半夏丸重者下水晶丹與之去痰免成癡疾但不可用大寒涼藥治之熱去則寒起亢則害承乃制若倉卒之間驚與風證俱作只用五苓散加辰砂末薄荷湯調服少解其證蓋五苓散內有澤瀉導小便心與小腸為表裡小腸流利心氣得通其驚自減內有桂木得桂則枯是以有抑肝之氣其風自停況佐以辰砂能安神魂兩得其宜大略要解熱涼心肝後用平和湯散調理稍熱之劑則難用醫者宜審之愚嘗感慨諸人每見驚風搐作不明標本混為一證遽然全用金石腦麝蜈蠶蛇蠍大寒搜風等劑投之耗傷真氣其證愈甚多致弗救殊不知驚生於心風生於肝搐始於氣是為三證其驚與風首已詳及然所謂畜氣而成搐陳氏之論最為明理但未著其方余於此證則用寬氣飲治之只以枳殼枳實為主蓋其氣也四時平和則身安一息壅滯則疾作況小兒啼哭不常其氣蘊蓄內則不能升降外則無由發泄展轉經時亦能作搐善醫者審察病源從而療之萬無一失更辨陰陽虛實不可輕忽若陽實證煎平和湯調三解散主之此急驚有搐之類若陰虛證煎固真湯調寬氣飲治之此慢驚有搐之類若暴感此證未別陰陽虛實先用五苓散和寬氣飲及少加寬熱飲三藥合用薑汁沸湯調灌即解大抵治搐之法貴以寬氣為妙氣順則搐停此自然之理男左女右手足搐者即為順證男右女左手足搐者即為逆證故難治也有男右女左證輕者投順搐散使分左右庶好療之天釣者初得時頓頓呵欠眼忽下淚身熱脈浮洪實是風痰壅聚上貫心包致經絡閉而不通目睛翻視頸項強仰兩手掣轉向後大哭如怒腳曲腰直發熱痰鳴爪甲皆青狀如鬼祟名曰天釣治法同前急驚內藥與服先解風熱次理痰氣斯為當矣暑風一證因夏月感冒風寒太甚致面垢唇紅脈沉細數忽發驚搐不省人事治用消暑清心飲辰砂五苓散及琥珀抱龍丸自發切勿以溫劑調補熱氣得補則復盛尤宜戒之又有急驚天釣之後變作潮熱手足逆冷有似瘧疾蓋因病愈之時不善將護外感風邪乘虛而入於經絡再未解散以致如此經曰重陽必陰重陰必陽又曰亢則害承乃制此其義也宜服柴胡加桂湯及當桂散氣實者則以烏犀丸水晶丹略與通利勻氣散止補後以參苓白朮散調理自然平愈此證所用藥品間使苦寒之味務在消陽盛之火肺金得勝肝木自平而風邪亦散斯為良法大凡幼稚欲令常時驚悸不作在乎腎臟和平故戴氏曰治驚不若補腎謂心屬火火性燥得肝風則煙焰起致生驚悸補腎則水升火降邪熱無侵雖有肝風不生驚駭其法當於申時進補腎地黃丸一服或琥珀抱龍丸用申時者蓋水生於申佐之以藥則腎水得平心火不炎自無驚矣慢驚治慢驚者考之古書亦無所據惟載陰癇而已蓋慢驚屬陰陰主靜而搐緩故曰慢其候皆因外感風寒內作吐瀉或得於大病之餘或傳誤轉之後目慢神昏手足偏動口角流涎身微溫眼上視或斜轉及兩手握拳而搐或兼兩足動掣各辨男左女右搐者為順反此為逆口氣冷緩或囟門陷此虛極也脈沉無力睡則揚睛謂兩目半開半合此真陽衰耗而陰邪獨盛陰盛生寒寒為水化水生肝本木為風化木克脾土胃為脾之府故胃中有風瘛音熾瘲音縱漸生其瘛瘲證狀兩肩微聳兩手垂下時復動搖不已名為慢驚宜以青州白丸子蘇合香丸入薑汁杵勻米飲調下虛極者加金液丹次用沖和飲同七寶散水煨薑煎服使氣順風散少解吐瀉間以胃苓湯救其表裡若吐不止可投定吐飲瀉不減宜服六柱散或日生湯去胃風定瘛瘲清神氣五苓散導其逆調榮衛和陰陽若痰多唇白四肢如冰不省人事此虛慢之極用固真湯速灌之以生胃氣胃氣既回投醒脾散沉香飲調理有慢脾風者自慢驚傳變始因吐瀉經久不治故胃弱脾虛脾虛生風風入經絡則手足無時搖動昏沉不省面帶痿色風勢太甚乃虛之極急用青金丹天麻飲灌服或六柱散固真湯不問有熱有痰皆風入脾經亦是危證若痰如牽鋸之聲面無風氣猶甚縮氣粗頑軟搐甚不可治也風毒風毒者因驚風之後風從氣行血從氣使毒氣蓄於皮膚流結而為腫毒遂成頑核赤色多在腮頰之間或耳根骨節之處重則成癰成癤謂之遁毒風宜以百解散牛蒡湯及當歸散倍加枳殼大黃水煎服或用皂角子薄荷同煎續投雄黃散消毒飲結在腮頰者治用烏豉膏以護咽喉外則敷以拂毒散及外消散若因跌撲破損皮膚風邪侵襲傷寒而發毒腫謂之破血傷風可投疏風散活血散及黃芩四物湯調治若發於喉下如帶橫纏者乃纏喉風也三因方烏喉風此證宜投化毒湯及烏豉膏熔化護喉卻不可於喉外用藥塗貼但依前遁毒風內治法如服藥後散止不定或上頭項或遊於面目而又復來喉下如赤紫微浮中有白突者陽證變陰亢則必害謂之赤遊風毒亦難治矣傷積凡嬰孩所患積證皆因乳哺不節過餐生冷堅硬之物脾胃不能克化積停中脘外為風寒所襲或因吃臥失蓋致頭疼面黃身熱眼胞微腫腹痛膨脹足冷肚熱不安昏神飲食不思或嘔或噦口噫酸氣大便酸臭此為陳積所傷如覺一二日先以百傷飲發表次當歸散入薑煎服溫動積滯方下烏犀丸六聖丸重與寬利後用勻氣散調補有食飽傷脾脾氣稍虛物難消化留而成積積敗為痢腹肚微痛先調胃氣次理積卻止痢則病根自除和中散理虛養胃三稜散烏犀丸助脾化積沉香檳榔丸守中湯進食止痢仍忌生冷黏膩之物不致復作有時時泄青水如生菜汁是受驚而後有積煩悶啾唧常似生嗔名為驚積先解驚後理積解驚五苓散或百解散理積三稜散或烏犀丸及三解散炒神麯生薑煎湯調服醒脾散沉香檳榔丸寧驚化積壯氣和胃仍節冷乳自然平治熱證仲景論曰有翕翕音吸發熱有蒸蒸熱此分汗下之不同翕者若翕之所覆明其熱在表也屬上太陽第一證以桂枝湯主之蒸者如熏蒸之甚主其熱在胃也屬陽明三十二證以調胃承氣湯下之此仲景法也緣小兒之熱似是而非若同而異有傷寒熱變蒸熱積熱麻豆熱驚風熱潮熱骨蒸熱有表裡俱虛而熱有熱雖同名則異可不明辨標本以施治乎須令驗證對證用藥斯為的論傷寒熱十指稍冷鼻流清涕發熱無汗面慘凌振右腮有紫紋治法載於傷寒條內變蒸熱溫溫微熱氣粗驚少哯乳瀉黃上唇尖有小泡如水珠子即變蒸也不須用藥攻治如兼他證者當依其所感之候略與和解不必重劑可也蓋變者變其形容蒸者蒸長肌肉三十二日為一變六十四日為一蒸又三大蒸積五百一十二日變蒸畢而形氣血脈筋骨全矣夫變蒸之説再考明醫陳氏書載十變之內五蒸存焉又有三大蒸計其數恰五百一十二日最為明矣積熱眼胞浮腫面黃足冷發熱從頭至肚愈甚或聞飲食之氣噁心及腹疼嘔吐治法詳載傷積論中麻豆熱面赤足冷身發壯熱呵欠頓悶咳嗽腰疼時或作驚腹痛自痢及中指獨自冷者是也治法詳見瘡疹證內驚風熱遍身發熱而光自汗心悸不寧脈數煩躁治法與急驚證同所用藥餌必先解表潮熱有午後發熱或日晡發熱對時如潮水之應不瘥是也先用百解散發表次以當歸散及三解散治之脈實者下之宜大柴胡湯虛浮散者微汗之用百解散若發熱而嘔者小柴胡湯主之虛熱因病後發熱無時一日三五次者此客熱乘虛而作先以胃苓湯加黃耆末溫米清湯調服次投錢氏白朮散或固真湯帶涼服及用溫鹽湯參入涼水送下黑錫丹固守元氣骨蒸熱身體虛贏遇晚二發有熱無寒醒後渴汗方止此乃疳病之餘毒傳作骨蒸或腹內有癖塊有時微痛用參苓白朮散薑棗三稜煎湯調服或投化癖丸先療脾虛宿滯次以柴胡飲為治仍忌雞酒羊面毒物有小兒熱證用表裡藥後其熱俱退既退復熱者何也療病至此難以概舉或再解表攻裡或施涼劑熱見愈甚以陰陽辨之何者為是推其原乃表裡俱虛而陽浮於外陰伏於內所以又發熱宜用溫平之藥和其里則體熱自除投錢氏白朮散去木香加扁豆水煎及黃耆六一湯安神散自然平復若日久汗多煩渴食減脈微緩喜飲熱可服真武湯雖附子性溫取其收斂陽氣內有芍藥性寒一寒一溫亭分得宜用之無不驗矣傷寒仲景一書前輩發明甚詳愚不敢贅姑舉其略按仲景傷寒論云春氣溫和夏氣暑熱秋氣清涼冬氣冷烈此四時正氣之序也惟冬時嚴寒去寒就溫不致於傷偶然觸冒名為傷耳小兒在襁褓中或長成而稟賦虛怯苟失其養百病蜂起故傷寒多得於秋冬或薄暮清朝蓋秋冬多冷夜起便送或遽出風寒之地為邪氣所侵旋即噴嚏凌振五指稍冷關紋不見面目俱紅慘而不舒氣粗體熱無汗惡寒是傷寒也或面色光而不慘汗出惡風是傷風也其候與大脈科若同而異治療之法亦相去不遠矣餘外不然蓋以小兒是純陽之體用藥不可太熱此醫門八法所謂治小兒無熱一也然仲景一十六條三百九十七法前賢名曰金匱豈不貴哉兼五運有太過不及之異六氣有逆從勝伏之差變生災眚音省應在人身或遇客邪臨御臟氣虛弱因受其病謂之時氣又與傷寒不同乃四時乖戾之氣如春應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反溫非其時而有其氣人感冒中傷而有病者不擇地之遠近所患一同當以何經何臟所受病證知犯何逆以法治之此仲景之妙旨然治小兒傷寒傷風與大方相同者若發熱身無汗麻黃湯主之以表實無汗榮血受邪而設也得汗則寒邪發泄而無壅遏之患若身熱自汗桂枝湯主之以表虛自汗衛受邪而設也解肌則風邪疏散而無壅滯之患凡治病之要尤在臨機審察庶無誤矣夾驚傷寒其候謂感寒時忽受驚觸情性昏沉身微有熱心躁或渴睡中多驚手足動掣面紅痰嗽咬牙呵欠山根準頭皆淡青色兩眉下有紫紅見論其得病之由或被驚發熱後感寒邪或先感寒邪後因被驚遂致兩熱相乘所有此候宜百解散發表次牛蒡湯治驚熱散邪氣若看證大蓯蓉當歸散三解散間以無驚丸琥珀抱龍丸與服夾食傷寒其證鼻流清涕頭疼發熱晝輕夜重時復吐逆噫氣酸餿面黃紅白變之不一目胞微浮乍涼乍熱心煩發渴腹痛脹滿皆因飲食過傷又感風寒激搏而熱其熱氣與食熏蒸於胃胃為水穀之海脾實則能克化今脾胃因飲食所傷致有斯疾先煎小柴胡湯加生薑自然汁同服或五苓散入薑汁沸湯調下與解寒邪溫胃止吐次用百解散及當歸散水薑煎服疏解外邪溫正胃氣烏犀丸去積勻氣散止補參苓白朮散調脾胃則愈矣下後傷風其候兩臉微紅眼胞浮腫發熱痰喘飲食少進此則亦因外感風寒未經發散下之失宜邪氣未除而正氣有損調理又遲致榮衛不和正氣失守脾胃尚弱過傷飲食名為食復用小柴胡湯和解次三稜散調治或因下後體氣虛弱腠理不密遽出風寒之地易為感冒此為再經外邪侵襲於皮毛皮毛者肺之合也風寒外侵於皮毛內合於肺經致有痰熱喘急肺主氣故也亦宜發散表邪既退然後調脾使中州之土固守則何患乎外邪得以侵襲哉用五苓散加麻黃去節存根沸湯泡過功全表裡水薑煎服其解表散惺惺散枳實湯或當歸散加陳皮水薑煎服以和中散調理夾風傷寒與前證相似但臉紅身熱氣粗微喘目淚口渴手足皆溫太陽冷汗口水流滴胸前時或惡風此因先傷寒發熱日久未經解散將傳入里而又感風風熱相搏於內致心脾蘊熱熱氣上逼口舌發瘡名為夾風傷寒諸熱引肝風目多眵淚口燥發渴手足溫者邪將傳裡口水不止而加生瘡者熱上蒸也太陽冷汗者表之虛也邪實表虛證在半表半裡之間宜以小柴胡湯加桂為用疏滌肝風羌活散和解四順飲去上焦熱則口舌之證乃除而重感之邪亦得消釋風寒互證活人書云脈似桂枝反無汗病以麻黃反煩躁風喜傷衛寒傷榮榮衛俱病仲景以大青龍湯治之然榮行脈中衛行脈外榮衛皆虛疾由生矣蓋兒小者因抱養失宜風寒不避致有斯疾兒大者或因水浸雨侵或因向火脫著遽然出外外邪乘虛而襲汗閉不通其後或冷或熱昏醒不定名為風寒互證但小方用藥品味分兩不與大人同若此證一汗風寒既除惟當順氣化痰慎勿投峻補之劑熱氣得補則復盛變生他證初用雄黃散水薑蔥薄荷同煎並三服稍熱投得汗即愈免為角弓反張之證次以當歸散惺惺散間服若痰不退牛蒡湯如意膏半夏丸結胸傷寒其候兩眉尖紅唇紫鼻青咳嗽口痛痰結氣促咳嗽不活身熱汗出目露白睛項頸如柔痓之狀不可俯仰結胸之證居身之高分故經云高者因而越之下者引而竭之所謂結胸如繫結而不能解者諸陽受氣於胸中邪氣與陽氣相結固而不解非虛煩結實之比胸膈高起不按自痛名大結胸按之方痛名小結胸有水寒熱結胸凡此諸證低者舉之高者陷之仲景結胸之高邪當行降下之法以下結固之邪內經曰結雖大猶可解也蓋傷寒之結非直達之劑孰能解之仲景治小結胸證以小陷胸湯主之平常小兒多有小結胸證然陷胸湯內有黃連極苦難以施之嬰孩如發表後但用鶴頂丹為治有兒最小者於此丹內加寬氣飲寬熱飲少許薑汁茶清調下自愈若僅六七歲兒投小陷胸湯入蜜同煎服取效壞證傷寒其候外察印堂多紫紋唇白如灰色四肢黃瘦吐瀉間作或寒或熱飲食減少大概外感風寒暑濕內因飢飽失節不能調護以傳受日深醫不辨其表裡虛實汗下失宜使陰陽反錯邪氣得勝正氣將衰胃納五味以養五臟脾受五味以分清濁而榮養百骸今汗下不依其法致傷榮衛榮衛者自中焦而生得其氣之清者為榮濁者為衛其重濁者為糟粕而下行偶六淫所侵治不如法則外邪日盛正氣乖常胃氣衰微變證多出或作瀉痢青黃吐逆寒熱或為腫滿偏枯五疳八痢或成丁奚哺露傳變不一各有條論隨證治之並宜先投加味白芍藥湯和解咳嗽咳嗽者固有數類但分冷熱虛實隨證疏解初中時未有不因感冒而傷於肺內經曰肺之令人咳何也岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣得從其合故難經云形寒飲冷則傷肺使氣上而不下逆而不收沖壅咽膈淫淫如養習習如梗是令咳也乍暖脫著暴熱遇風邪氣侵於皮膚肺先受之而為咳嗽若初得時面赤唇紅氣粗發熱嗽來痰鳴此是傷風痰壅作嗽用清肺飲五拗湯及小柴胡湯羌活散皆可解表次青木香湯有小兒汗出未乾遽爾戲水亦致傷風咳嗽外證眼胞微浮額汗痰鳴亦宜清肺飲瀉肺湯與之疏風化痰解利邪熱小柴胡湯亦可若嗽日久津液枯耗肺經虛矣肺為諸臟華蓋臥開而坐合所以臥則氣促坐則稍寬乃因攻肺下痰之過名為虛嗽聲連不斷喉中痰鳴氣息欲絶嗽罷則吐白沫或乾嘔此肺虛而氣不順也面唇皆白而慘嗽過額上多汗哽氣長出乳食減少致脾虛而胃亦虛宜其有吐投茯苓厚朴湯及藿香飲次溫脾潤肺理中湯加杏仁北五味水煎服蓋此藥補脾而益肺藉土氣以生金則自愈矣或咳而夾紅有紫黯色於理中湯內再加乾薑為用亦良法也有脾虛亦能作嗽當投補劑用醒脾散茯苓厚朴湯令脾氣實然後間以清肺飲煎服疏解肺經風寒及藿香飲助脾養胃亦救子益母之法也有一證咳嗽至極時頓嘔吐乳食與痰俱出盡方少定此名風痰壅成肝木克脾土宜以白附飲投之即效百日內嬰孩偶咳嗽痰壅睡中不寧亦因産後感風而得但不可過用發散之劑先以解表散一二服次投貝母湯及惺惺散為治小兒喘疾重於咳嗽然有虛實冷熱之分不可概舉實熱者投清肺飲加五和湯水薑蔥煎及瀉肺湯碧玉丸為治經云喘急多因氣有餘蓋肺主氣故也虛冷者投枳實湯水薑煎並如意膏補肺散坎離湯自效此肺虛感風氣不升降致有是證及用定喘飲常驗不拘冷熱皆可服涎壅失音二聖散主之齁䶎一證郭氏曰小兒此疾本因暑濕所侵未經發散邪傳心肺壅而為熱有熱生風有風生痰痰實不化因循日久結為頑塊丸如豆粒遂成痰母細推其原或啼哭未休遽與乳食或飼以酸鹹氣鬱不利致令生痰或節令變遷風寒暑濕侵襲或墮水中水入口鼻傳之於肺故痰母發動而風隨之風痰潮緊氣促而喘乃成痼疾急宜去風化痰先以五苓散同寬氣飲寬熱飲用少薑汁和百沸湯調服次進知母湯雄黃散如意膏半夏丸吐瀉吐瀉者乃揮霍擾亂之證霍者吐亂者瀉有心痛而先吐者有腹痛而先瀉者莫不由中焦而作上焦主納而不出中焦主腐化水穀而生榮衛灌溉百骸下焦分別水穀主出而不納此三才成式日用常行故脾居中州胃為水穀之海浮哺入胃脾能克化然後水穀分在臍上一寸名分水穴分其清濁傳受得宜則無吐瀉之患凡嬰孩上吐不止下瀉不停皆因六氣六氣者筋骨血肉積氣是也未完六淫六淫者風火暑濕燥寒是也易侵兼以調護失常乳食不節遂使脾胃虛弱清濁相干蘊作而然有先瀉而後吐者乃脾胃虛冷其候先瀉白水或白凍吐亦不多口氣緩而神色慢額前有汗六脈沉濡此為冷也先吐而後瀉者乃脾胃有熱氣促唇紅吐來面赤脈洪而數渴飲水漿此為熱也冷熱之分要須詳審有數歲者亦患此證始自夏秋晝近極熱之地解衣乘涼夜臥當風之所失蓋感冷陰陽相搏氣射中焦名為霍亂活人書用香薷散調治以其能分別水穀升降陰陽又曰熱多欲飲水者五苓散寒多不飲水者理中丸詳究治法得非欲平中焦乎又有脾經積滯未除再為飲食所傷不吐則瀉不瀉則吐宜以三稜散化積守胃散和中必自安矣錢仲陽議曰吐乳瀉黃是傷熱乳吐乳瀉青是傷冷乳皆當下之詳夫此理乃迎奪之法也不若傷熱者用五苓散以導其逆傷冷者用理中湯以溫其中自然平復有小兒盛夏初秋遇夜乘風渴而飲水過餐生冷果物攻激腸胃遂乃暴吐暴瀉傳作手足俱痹筋攣而痛痛則神志不寧以驚證治之誤矣所謂筋遇寒則引縮又以陽明養宗筋屬胃與大腸因內傷生冷飲食外感風邪吐瀉交作胃氣固虛不能養其宗筋亦致攣急此證口氣溫面色慘脈沉緩再以手按兩膝腕下見筋縮而引於皮間是其候也治以理中湯加附子半生半炮水薑熟煎空心溫服更詳虛實冷熱為治可也諸吐論吐之原難以概舉有冷吐熱吐積吐傷風嗽吐傷乳吐其吐則同其證有異各述於後冷吐乳片不消多吐而少出脈息沉微面白眼慢氣緩神昏額上汗出此因風寒入胃或食生冷或傷宿乳胃虛不納而出宜溫胃去風除宿冷用當歸散水煨薑陳皮煎服或間投沖和飲理中湯及薑橘湯定吐飲如諸藥不效以參香飲治之熱吐面赤唇紅吐次少而出多乳片消而色黃遍體熱甚或因暑氣在胃或食熱物精神不慢而多煩躁此熱吐也宜解熱毒用大順飲溫熟水空心調下並五苓散小柴胡湯並加薑汁緩服及香薷散主之誤服熱藥先投緑豆飲解之次服止吐之劑積吐眼胞浮面微黃足冷肚熱晝輕夜重兒大者脈沉緩此宿冷滯脾故吐黃酸水或有清痰脈實而滑為食積所傷吐酸餿氣或宿食並出兒小者哯乳不化是也先用五苓散薑汁溫湯調下和解次以烏犀丸主之最小者投三稜散化癖丸傷風嗽吐有熱生風有風生痰痰結胸中肺氣不順連嗽不止和痰吐出此為嗽吐痰壅而作乃為實證宜去風化痰先投清肺飲次小柴胡湯為治若嗽久而肺虛土不生金故面白唇燥干嗽乾嘔而無痰可溫補為上用茯苓厚朴湯惺惺散如意膏為治傷乳吐才乳哺後即吐或少停而吐此因乳飲無度脾氣弱不能運化故有此證譬如小器盛物滿則溢治法宜節乳投三稜散諸吐不止大要節乳徐徐用藥調治必安節者撙節之義一日但三次或五次每以乳時不可過飽其吐自減及間稀粥投之亦能和胃解吐屢見不明此理惟欲進藥以求速效動輒斷乳二三日致餒甚而胃虛啼聲不已反激他證蓋人以食為命孩非乳不活豈容全斷其乳然乳即血也血屬陰其性冷吐多胃弱故節之醫者切須知此乳母亦宜服和氣血調脾胃等藥諸瀉論瀉之原有冷瀉熱瀉傷食瀉水瀉積瀉驚瀉風瀉臟寒瀉疳積釀瀉種種不同各分於後冷瀉多是白水瀉密而少腹痛而鳴眉皺目慢面帶白色額有汗多此為冷瀉沖和飲當歸散合和水煨薑煎服並守中湯參苓白朮散益中膏沉香檳榔丸治之熱瀉大梗黃色如筒吊水瀉過即止半日復然心煩口渴小便黃少食乳必粗此為熱瀉先用五苓散或大順飲次以錢氏白朮散主之香薷散亦佳傷食瀉乃脾胃素弱復為生冷果食所傷故大便不聚而瀉或因乳母餐生冷肥膩之物自乳而過亦能作瀉面唇俱白瀉稀而少或如壞雞子腥臭異常身形黃瘦名傷食瀉宜先溫正胃氣次理積而後固脾沖和飲當歸散合和水煨薑棗子煎服理積兒大者烏犀丸小者化癖丸三稜散固脾和中散醒脾散水瀉謂之洞泄乃陰陽不順水穀不分瀉黃水而小便少番次密而無度是夏秋之際晝則解衣取涼夜則失蓋感冷冷熱相激清濁渾亂或因母自熱中來乳有熱氣遽以哺之令兒脾胃不和水穀交雜而下以㕮咀五苓散加薏苡仁車前子半夏水薑煎服分正陰陽或先用大順飲溫白湯調下香薷散調中止補錢氏白朮散六和湯亦好積瀉脾氣虛弱乳食入胃不能運化積滯日久再為冷食所傷傳之大腸遂成泄瀉留連不止諸藥不效蓋以積在脾胄積既未除何由得愈宜先去積後止瀉瀉止實脾則病除矣三稜散烏犀丸續用沉香檳榔丸參苓白朮散和中散香橘餅調理驚瀉糞青如苔稠若膠黏不可便止但鎮心抑肝和脾胃消乳食斯為治法先投五苓散次用三稜散水薑粳米煎服或三解散煨神麯生薑煎湯調服及沉香檳榔丸不驚丹調治風瀉慢驚大病後有之其糞稀黃褐色或夾不消乳食同下此因脾虛所致或夾褐黑色者屬腎蓋脾虛為腎水所乘故也若久不進飲食再有驚搐宜疏腎水去脾風次補脾則自愈庶無復作之患疏腎水㕮咀五苓散加黑牽牛半生半炒並薏苡仁水薑煎服去脾風瀉黃散調脾氣參苓白朮散臟寒瀉糞如青竹色下稀不稠或下青水未瀉時腹痛而鳴叫哭方瀉多是生來三五月內有此周歲則無始因斷臍帶短風冷自外逼內而成此疾先用沖和飲水蔥白煎投溫中解表次以當歸散水煨薑煎服及投勻氣散理中湯疳積釀瀉其候面色痿黃肚脹腳弱頭大項小發稀且豎肌肉消瘦不思飲食晝涼夜熱或腹內有症癖氣塊瀉則顏色不等其臭異常其瀉有時或一月半月旬日一番自瀉自止名為疳積釀瀉先以當歸散加三稜陳皮水薑煎服次投烏犀丸沉香檳榔丸及化癖丸蘆薈丸沒石子丸兒最小者難下丸子止投三稜散快膈湯自然痊愈若瀉或痢色青甚而淡黃夾白寒多熱少此陰邪勝陽宜用守中湯胃苓湯與服扶表救里方進當歸散加陳皮紫蘇水薑糯米煎服亦宜和解理中湯清米飲空心調服溫脾去濕益氣清神寒盛者理中湯內加熟附子水薑棗煎服次投南星腹皮飲水薑煎服和脾胃去陰邪若瀉或泄色青淡而有沫糞稠熱多寒少亦致面黃肌瘦煩躁不寧宜以㕮咀五苓散加薏苡仁車前子水薑煎服解散餘邪仍用茵陳蒿梔子仁煎湯調細末五苓散溫服退黃色消陽毒及當歸散水薑棗煎投或服萬安飲四神散赤白痢赤白之痢世人莫不曰赤為陽為熱白為陰為冷或曰無積不成痢至於調治若以冷熱之劑互進或投去積之藥必難取效不究其原何由可療且四時八風之中人五運六氣之相勝夏秋人多痢疾內經曰春傷於風夏生飧泄至真要大論曰少陽在泉火濕所勝民病注泄赤白其可拘於無積不成痢之説若專以積為論豈一歲之中獨於夏秋人皆有積春冬不然蓋風邪入胃木能勝土不為暴下則成痢疾赤白交雜此為陰陽不分法當分正陰陽五苓散以導其逆理中湯以溫其胃使色歸一然後施治若一分之後仍赤白同下則當究其所患之因若先白後赤乃內傷生冷外失於蓋由元氣感於暑熱治法先救其里次解暑毒若先赤後白乃先傷熱而後失蓋感冷先宜解熱後治其痢有夾熱而痢者則下純鮮血此風能動血宜冷服黃連香薷散川草散以當歸散加醋炒蒸柏葉水薑煎服或羌活散加三和湯水薑倉米煎有人冷而痢者則下純白凍或白上有粉紅色或似豬肝瘀血皆為陰證蓋血得寒則凝泣音澀故也先用㕮咀五苓散加守中湯煎投次以附子理中湯帶涼服或固真湯倘不辨其虛實冷熱妄行施治必致脾胃愈虛不能乳食成噤口痢者則難療矣又有裡急後重蓋裡急為陽後重為陰未圊音清廁也前腹痛為裡急已圊後腹痛為後重故里急者大腸澀也先以大順飲加寬氣飲和解及羌活散水薑倉米煎服次下寬腸丸後重者為氣虛用㕮咀五苓散加人參水薑煎服並投香連丸若二證俱作前二丸子並進或雙金飲金粟丸亦效然瀉痢二字自是兩證糞夾水來多而順者曰瀉帶血凍白凍來三五點而痛者曰痢輕重陰陽於此而分斯為治法有膿血交雜經久不止晝輕夜重或晝夜頻數食減痛多並用萬金散神效散主之有五色痢者乃因五臟蘊熱日久不散故有是證蓋五臟受熱榮衛不調五穀不化熏腐臟腑神氣昏沉此候已危最苦是腹中刺痛兒小者無治法蓋五色者乃五臟之色皆見於外兒大者可用局方三神丸或小來復丹以五苓散送下或者可療若投藥如故不可為也又有風痢多是黃褐色與疳瀉頗同但不臭為異耳此風毒停滯於脾宜去脾經風毒瀉黃散主之若見赤白同下久而不禁小便澀少痛熱並作唇裂眼赤氣促心煩坐臥不安狂渴飲水穀道傾陷時復面容如妝飲食不進者難治腫證此疾更多投五皮飲為好原腫病之由標本之疾腎主元氣天一之水生焉肺主沖化地四之金屬焉腎為本而肺為標皆至陰以積水其為病也腎者胃之關鍵關鍵不利樞機不轉水乃不行滲於脈絡皮膚而為浮腫當推究內外所因而為施治兒大者憑脈以明虛實古方有十種論證短氣不得臥為心水兩脅緊痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水小便閉澀為胃水小腹急滿為小腸水然脈浮為風為虛沉伏為水病沉則脈絡虛伏則小便難即為正水脾脈虛大多作脾腫因循不治乃成水腫蓋脾屬土喜燥而惡濕常感濕氣濕喜傷脾血化為水土敗不能制水則停蓄不行留滯皮膚故作浮腫初得病時見眼胞早晨浮突至午後稍消以羌活散疏解次醒脾散主之及間投南星腹皮散其脾冷困則燥以草果縮砂之類然此證夏與秋冬治之頗易惟春不然蓋四時之水無如春水泛溢兼肝木旺而脾土受克不能受水所以難療進退不常須徐徐調理取效若脾熱而困又以藥燥之雖火能生土亦可勝水奈何燥之太過土不敵火則熱愈甚而不食發熱煩渴醫者又進之以燥劑由此而面目轉浮致脾敗而手足背皆腫蓋手足背與臍凸音迭即脾之外候有未經發表遽用下藥以瀉之則一瀉而腫消乃云得瀉之力殊不知脾愈瀉而愈虛不逾旬月其腫如初此世人只知瀉腫為最而不求其十補勿一瀉之論法當隨四時用藥解表通利小便春以七寶散加麻黃桂枝赤茯苓水薑蔥煎服夏以五苓散加麻黃車前子薏苡仁秋以清肺飲加羌活細辛商陸冬以沖和飲加白朮生川烏赤小豆以上三藥並用水薑蔥煎投滋潤救脾導水湯劑滲泄之乃為良法更以香陸胃苓丸赤蒼飲頻服自然獲安蓋內經云開鬼門發汗也潔淨府利小便平治權衡以平為期此之謂也有初腫便覺痰嗽氣喘小水不通正屬肺腎所主先服解表散次以三白散為治餘證輕者投商陸丸故經曰其高者因而越之即湧吐之義也下者引而竭之即滲泄之義也凡得此病非一朝一夕之故不可以孟浪之藥求其速效以致虛脫如愈後再感外風滿面虛浮用排風湯和解仍服前救脾湯劑免致反復飲食之忌惟鹽醬齏鮓濕面皆味鹹能溢水者並其他生冷毒物亦宜戒之重則半載輕者三月須脾胃平復腫消氣實然後於飲食中旋以燒鹽少投則其疾自不再作故劉氏曰治腫非易補養尤難所忌者切須詳審有經久不消者下浚川丸即效疳證小兒疳證其名有五心肝脾肺腎是也詳析於後咬五巧切牙舒舌舌上生瘡愛飲冷水唇紅面赤喜伏眠於地名曰心疳目生眵糞髮際左臉多青或白睛微黃瀉痢夾水或如苔色名曰肝疳愛吃呢土冷物飲無度身面俱黃發稀作穗頭大項小腹脹腳弱間或釀瀉肌瘦目慢晝涼夜熱不思乳食名曰脾疳鼻下赤爛手足枯細口有腥氣或作喘嗽右腮㿠白名曰肺疳兩耳內外生瘡腳如鶴膝頭縫不合或未能行牙齒生遲其縫臭爛傳作走馬疳之類名曰腎疳大抵疳之為病皆因過餐飲食於脾家一臟有積不治傳之餘臟而成五疳之疾若脾家病去則餘臟皆安苟失其治日久必有傳變然脾家病宜蘆薈丸沉香檳榔丸或水晶丹烏犀丸更察虛實療之有蟲者投使君子丸化蟲飲如心腹痛吐清水蟲自下多投二聖丸諸疳證皆宜用局方五疳保童丸或萬應丸常服化積治疳仍各投本臟調理之劑寧心用茯神湯調肝用耆歸湯調脾用參苓白朮散補肺用補肺散補腎用調元散庶各得其宜則前證不致再作走馬疳凡得此候多因氣虛受寒及有宿滯留而不去積溫成熱虛熱之氣上蒸或食甜酸鹹膩之物而脾雖喜甘積滯日久蘊熱上熏於口致齒焦黑爛間出清血血聚成膿膿臭成蟲侵蝕音食口齒甚致腮頰穿破乳食不便面色光浮氣喘熱作名走馬疳治之之法先去積熱用當歸散合三稜散水薑棗煎服次投蘆薈丸玉露飲及以溫鹽水灌嗽或軟雞翎蘸鹽水拂洗略拭乾仍以燒鹽散內金散密陀僧散傅之若經久不愈者傳於唇之上下乃成崩砂證或穴發滿腮齒落骨露飲食減少氣促痰鳴必致危矣脫肛脈訣曰大腸共肺為傳送蓋肺與大腸為表裡肛者大腸之門肺實熱則閉結不通肺虛寒則腸頭出露有因痢久裡急後重努力肛開為外風所吹或伏暑作瀉腸滑不禁或稟賦怯弱易於感冷亦致大腸虛脫凡小兒所患瀉痢皆因暑濕風熱乘脾胃虛而得蓋風屬木本勝則制土土主脾胃虛而受制又濕喜傷脾因虛受濕不能分別清濁水穀交雜則為洞泄洞泄既久大腸亦虛大腸乃手陽膽燥金而土虛不能生金金氣既虛則傳送之道亦虛又為風冷所襲故肛門脫而不收法宜補脾溫胃使金得受母之益而氣實宜藿香飲勻氣散平胃散主之次則內投固腸之劑用健脾飲養臟湯服餌外以敷貼之法用伏龍肝散傅之及萆麻膏貼囟門使引氣上令其自收如收盡仍以水洗去其膏又有邪熱積滯於大腸未經疏滌亦成此疾其肛門色紅而軟肺脈浮數右手指紋紫見身微有熱時或煩躁先投清肺飲疏解次用薄菏散蟠龍散為治間服萬安飲亦佳癇證古人議癇最多大概在乎觀形切脈明辨陰陽對證用藥不致妄投湯劑為上陰癇者因慢驚後去痰不盡痰入心包而得四肢逆冷吐舌搖頭口嚼白沫牙關緊閉但不甚驚搐作啼面色或白或青脈息沉微故嬰孩寶書云睡中吐舌更搖頭正此之謂治以固真湯加日生湯同煎調寬氣飲和解陽癇者因感驚風三次發搐不與去風下痰則再發然三次者非一日三次也或一月或一季一發驚搐必經三度故曰三次所謂驚風三發便為癇即此義也其病主身熱自汗兩目上視嚼沫咬牙手足掣搦面色紅紫六脈浮數以百解散加五和湯水煎疏解次下痰用水晶丹或半夏丸胎癇者因未産前腹中被驚或母食酸鹹過多或為七情所汨致傷胎氣兒生百日內有者是也發時心不寧面微黃氣逆痰作目上視身反張啼聲不出先用參蘇飲和解次以不驚丹或琥珀抱龍丸間投輕者可愈重則亦危六畜癇者發時作牛馬豬羊雞犬聲便致僵仆口吐涎沫不省人事張氏論此蓋初發作羊犬聲者咽喉為風痰所梗聲自如此其理甚明若言六畜者特強名耳凡得此證宜多投疏風順氣化痰等劑早為治療則免終身之患食癇者因中焦不和飲食時偶被驚搐則驚氣停滯中脘食不克化淹留日久氣鬱痰結痰結則風熱生由此致疾陳氏有曰結氣而成癇此其義也宜寬中順氣去風痰療驚積和脾胃則安矣狂癇者亦屬陽難經云重陽則狂至長成小兒才發時妄言不食而歌甚則逾牆上屋棄衣而走或一日二日方醒始因冒熱感風風熱內蓄久則風痰鬱結上迷心包蓋心乃神之舍偶為邪熱攻逼則神失所守而昏亂名曰狂癇然心火肝木皆為物火不自炎因風吹起煙焰木不自動因風撼而自動搖風火合德兩陽相搏其熱可知心藏神肝主驚因風生痰以致於此醫者為治療既能清心平肝疏風退熱得病暫安不與鎮心下痰則痰涎結實停滯心絡病至再三加以發搐頻數難為治療必成廢人有曰驚癇即與此證相類若乍感真疾日月稍近法當解表散驚及涼心肝次下風痰解表散驚百解散涼心肝三解散防風湯下風痰水晶丹碧玉丸更須臨證參詳乃無失也瘧疾內經瘧論云痎瘧皆生於風而發作有時何也岐伯曰夏傷於暑秋必病瘧謂腠理開而汗出遇風或得於澡浴水氣舍於皮膚因衛氣不守邪氣並居其疾始作伸欠寒栗腰背俱痛骨節煩疼寒去則內外皆熱頭疼而渴乃陰陽二氣交爭虛實更作而然陰氣獨勝則陽虛故先寒戰栗腰背頭項骨節皆痛陽氣獨勝則陰虛故先熱發時不嗜食善嘔頭疼腰痛小便不利陰盛陽虛則內外皆寒陽盛陰虛則內外俱熱此外感六淫或內傷七情蘊積痰飲病氣與衛氣並居故病日作衛氣晝行於陽夜行於陰得陽而外出得陰而內薄內薄五臟六氣深入不能與衛氣俱出則間日而作當衛氣所至病氣所在則發在陽則熱在陰則寒經曰亢則害極乃反俟陰陽各衰衛氣與病氣相離則病休陰陽相搏衛氣與病氣再集則病復各隨其衛氣之所在與所中邪氣相合而然也先寒後熱者先傷寒而後傷風名曰寒瘧先熱後寒者先傷風而後傷寒名曰溫瘧但熱不寒者名曰疸瘧身重寒熱骨節痛腹脹滿自汗善嘔名曰濕瘧但寒不熱者名曰牝瘧蓋瘧之為病而證狀非一故處方之制隨其陰陽虛實脈病證治汗吐下溫對證施劑以平為期然百病中人必因其正氣之虛感受邪氣留而不去其病為實自表傳裡先汗後下古今不易蓋治瘧之法必須先表用百解散水薑蔥煎投次小柴胡湯加桂水薑棗煎服以和解表裡之邪自然作效若表裡實用當歸散五和湯或烏犀丸六聖丸下之勻氣散止補後以藿香飲加草果良薑水薑棗煎投正胃氣去寒邪則自平復如解表後寒熱往來以二仙飲或三聖丸截之寒熱既除用平胃散加茴香湯和勻鹽湯空心調服溫胃燥脾進飲食使中州之土既實則外邪不戰而自屈此為明論有寒多熱少經久不愈致脾胃弱飲食減神色慢二薑丸主之及清脾湯為治每見治瘧不明理者多取草藥挪水冷服或露而投之水傷脾胃耗損真元變證百出或傳成浮腫或轉作疳瀉或變為冷痢致脾胃虛弱飲食減少因而不救者有之且嬰孩嬌脆何堪用以草藥服餌為醫為父母者切宜戒之癖證嬰兒始生稟賦未完失於襁褓之不謹乳哺之不節外為六淫侵襲內因五臟氣虛冷積久停於脾不能克化結成癖塊突於脅下或左或右俗曰龜癆其疾皆因積滯蘊作致有寒熱或腹肚疼痛或晝涼夜熱治療之法氣實者亦須溫正胃氣後用烏犀丸或水晶丹下之如過二三次即以稀粥略止候所作形證消盡方投補益之劑氣虛者先與調脾胃固真元神色稍正飲食進多如前法下之若太虛甚用三稜散化癖丸漸消之順適陰陽以平為期然先補後瀉行迎奪之法則取去陳寒冷積若面黃唇白發豎肌瘦乃為虛極不可輕下但徐徐用藥消化調理為上若兒小者更令乳母常服藿香飲使藥從乳過亦少助也疝症按內經大奇論曰腎脈大急沉肝脈大急沉皆為疝證心脈搏滑急為心疝肺脈沉搏為肺疝蓋疝者寒氣結聚之所為故令臍腹絞痛者是也又巢元方曰諸疝者陰氣積於內復為寒氣所傷榮衛不調二氣虛弱風冷入腹而成故內經云急者緊也緊則為寒為實為痛血為寒泣音澀則為瘕氣為寒聚則為疝皆因本藏氣虛外感於寒濕內傷於生冷遂使臍腹絞刺激搏而痛無有定處倉卒之際不堪忍者謂之疝也並宜先用五苓散沸湯調服和解輕則但以白芍藥湯烏梅散鉤藤膏為治重者金茱丸散氣丸未有不愈也龜胸嘗論此候因風痰停飲聚積心胸再感風熱肺為諸藏華蓋居於膈上水氣泛溢則肺為之浮日久凝而為痰停滯心胸兼以風熱內發其外證唇紅面赤咳嗽喘促致胸骨高如覆掌名曰龜胸治法寬肺化痰利膈以除肺經痰飲先用五苓散和寬氣飲入薑汁蔥湯調服次清肺飲雄黃散碧玉丸如意膏為治若投前藥愈而復作傳變目睛直視痰涎上壅兼以發搐則難治矣龜背者蓋初生嬰孩未滿半周強令坐早客風吹著背脊傳入於髓故令背高如龜之狀名曰龜背終成痼疾何以為治驚丹嬰孩生後百日之內半歲以上忽兩眼胞紅暈微起面帶青黯色向夜煩啼或臉如胭脂此伏熱在內亦有臉不紅者始因居胎之時母受重驚驚邪傷胎遞相傳襲降生之後復受熱毒或再有驚有驚則有熱熱氣內蘊形發於外初發時散生滿面狀如水豆腳微紅而不壯出沒休息無定次到頸項赤如硃砂名為驚丹用四聖散先洗其目次百解散加五和湯同煎與解驚熱丹毒牛蒡湯當歸散三解散黃苓四物湯皆可為治如驚丹發至胸乳間微有痰喘作搐急宜宣熱拔毒免致內流為害不淺五和湯加升麻生乾地黃水薑燈心煎服則自消除仍用前數藥調治不生他證或投萬安飲瘡疹斑毒附後瘡疹之作始自嬰孩生時啼聲一出則咽下口中穢濁蓄之在胃因氣運變遷主客勝復邪氣鬱發與元受穢濁激搏而形於肌肉皮膚之外初發有類傷寒不拘四時皆有此候經云春夏為順秋冬為逆蓋春夏則陽氣布玄府開人之氣血流暢邪毒易出秋冬則寒氣勝而水冰地凍人之氣血凝泣音澀故難出也小兒所患此證輕重不等命名亦異輕者如麻俗言麻子重者如豆謂之豆瘡重而又重密如浮漂俗曰赤漂既傳入此已是危急醫與病家切宜詳審故出各有其名心為紅點肝為水疱肺為膿疱脾主結痂惟腎居下不受穢濁所以獨無其證若見瘡色黑陷乃毒氣入腎急投麝香人齒散救之及一匕金尤妙此言五臟各有所主及其發也始焉壯熱腰痛咳嗽面目皆赤或乍涼乍熱兩足微冷有驚搐譫語者有腹痛欲吐者有頭痛煩渴者六脈緊數耳尻音蒿俱冷呵欠頓悶至五六日身出紅點紅點成水疱水疱成膿疱膿疱之後結痂疕則愈矣此證才見似是而非若同而異疑二之間但以升麻湯加麻黃與之發表及清肺飲蓋肺主氣王氏曰豆瘡氣均則出快故用之仍不可過投兼此疾首尾無下法若下之必損脾胃然萬物得土氣溫暖而生下之則脾土虛冷氣血無自而盛故豆瘡因脾胃虛冷而氣血亦衰遂有伏陷之變又內經云諸痛癢瘡瘍皆屬於心雖各藏形證不同而心實為之主心主血因其血熱在裡再遇六淫侵襲兩相攻擊自內而形於外則發之為豆瘡未有不先見其血點而後結膿疱故其原出於心或痛或癢以分虛實經曰諸痛為實諸癢為虛切宜知此不可妄投藥餌若一出便齊者為重不齊者為輕以中和湯通順表裡及耆歸湯催脹而已既出不多發之亦少此為本疏不宜再發有大熱者以導赤葛散利小府微熱者用㕮咀五苓散加人參甘草水煎欲出不見者快斑飲久而不結痂疕者是表有熱盛蒸於皮膚可用升麻湯加黃芩以解之若豆瘡見形有渴瀉吐痢用陳氏木香散異功散豆蔻丸治之有虛癢者多服耆歸湯及中和湯以上豆瘡大約施治不過如此其餘雜證預防之法胡大卿陳文秀二公之書該載詳備或問升麻湯治豆瘡已發未發皆可服何如愚曰豫每致思及此屢見病家不循次序不問可否以為常服自取危困良可嘆也殊不知古人立方深有意焉但後學不能究心造微以為一定之方誤人多矣蓋未發之先可服使其解利肌膚自然出快已發之際便不可服為其藥性差涼凝滯氣血毒不能出反以為害結痂之後可服使其解散餘毒氣順血和免有豆癰之患或問豆瘡倒靨有用麝香人齒散作效亦有不效者何豫曰其説有二若見黑陷毒氣入腎腎色主黑蓋齒者腎之餘用麝齒之法引導歸腎而發出其毒故效耳及用一匕金救之其效尤速若見癢塌灰白色脾虛所致多投陳氏異功散取效以上二證各有主治不可執一切須詳審或問豆瘡投紫草飲固好亦有不服者曾子曰處方之妙在乎君臣佐使後之醫者不諳古法令病家自取紫草修合品味或為湯使入諸藥內彼欲速效而倍用恣飲按本草云紫草性寒小兒脾氣實者或爾偶中脾氣虛者反以為害如戴氏方名紫草茸飲後人訛傳此方缺其茸字蓋茸者春月才生之芽色澤而紅嫩得陽氣之使然以類觸類所以用發豆瘡故效但罕得嫩茸後以紫草頭僅半寸者代之即與茸初萌處同類今人不達其理遽全用之有脾虛者服之作瀉瘡陷不救者多豫嘗目擊其事深為可傷凡治豆瘡不可不明此理蓋戴氏紫草茸飲內有人參黃耆當歸白芍藥佐之故用驗矣或問病豆瘡者忌食粥然歟豫曰此俗忌也病家恐患者瘡爛如粥故忌之其實不然毒氣自里達表滿口糜潰乳食不能進非以粥飲飼之則脾土虛而豆瘡陷必致不救深可痛惜豫嘗調治此證始終與粥全活多矣蓋粥者以米為之何毒之有為父母者切宜知此或問禁食葷腥者何豫曰此亦世俗拘執之論天以五氣生萬物人以五味養五臟豆瘡之萌始因藏受邪毒感時氣而鬱發自內達外榮衛俱虛裡氣亦弱必藉五味葷腥以為滋補使氣順血和自然出快但不可食動風發熱之物以助毒氣亢則必害或問豆瘡後與産後相類何如豫曰蓋産後之婦血脈傷損榮衛大虛敗血未盡偶六淫侵襲便致急證亦有不救者故郭氏著産後二十一論正為此設且小兒豆瘡一身精血皆形於外熱作脹痛叫聲不已耗損真氣結痂後表裡俱虛榮衛亦弱餘毒未解失於調護暴感邪氣多致夭傷與産後傳變何異在父母者倘不究心及此悔將噬臍為之晚矣然有瘡少氣實飲食如故又不拘以此論醫者宜審之切勿例指為虛也凡豆瘡欲愈未愈之間傳變黑陷乾枯咳嗽失音吐瀉煩渴渾身手足俱冷睡則昏迷飲食減少及痰多氣促燥癢皆為不治醫者宜察之世言麻子者亦疹毒也經曰疹屬於脾胃為脾之府有疾則同矣疹毒乃天行氣運變遷之使然亦隨天地乖戾之氣而受病故曰時氣不拘長幼身發大熱咳嗽連聲腰痛口乾足冷有寒熱腹痛者有頭疼自痢者有煩熱驚搐者此熱使然也但外證形於身體頭面如蚊蚤所齧五結切發紅點而起頭其瘡腳有紫黯色為異耳蓋因四時有非節之氣著人肌膚留而不去再經外邪鬱蒸與元受蘊熱相觸毒氣遂發於外形而為疹若熱太甚則為癰為疽為赤紫丹瘤傳入臟腑治之稍緩亦致害人有胎受穢液熱毒蘊蓄於肺胃因感時氣而發者並以清肺飲疏表及百解散去桂加黃連水煎或餘毒之氣上蒸口齒糜爛作臭飲食不便以當歸散加七寶散入鹽水薑煎服並牛蒡湯疏風化毒若疹出盛時頭痛肚熱神思煩悶麥門冬湯主之如夏月得此證者煩躁發渴小便少神不安投卻暑丹即效有毒氣甚者滿口成瘡目赤腫痛失音噁心此餘毒在肺胃之間未解致肺胃俱虛肺虛則語聲不全胃虛則飲食不納急宜早治若氣促心煩驚悸者病必致危矣世言此證有溫毒發斑有胃爛發斑若溫毒發斑其癮疹如錦紋片出於兩腋之下蓋兩腋者氣之道路故蘊毒隨氣之道路而先出其疾咳嗽煩悶或嘔清水此因冬時感冒寒毒停於肌肉之間至春陽氣發動而形於外名為溫毒發斑以百解散牛蒡湯及當歸散加陳皮黃連為治胃爛發斑初因傷寒下早熱毒乘虛入里及當下而不下亦致熱毒內蒸於胃胃受熱毒則發出於皮膚斑之赤者可療黑者十死一生治法亦同前議活人書以玄參升麻湯大青四物湯化斑湯為治大人小兒病同一體用藥施治無逾古法但小方分劑則輕少不等耳此證更宜投拔毒飲升脈湯前豆瘡餘毒發見皮膚潰爛治用黃土散陰囊腫巢元方論曰諸筋會於陰器邪客於厥陰少陰之經與冷氣相搏則陰囊腫痛而引縮經中雖分四證曰腸㿗氣㿗水㿗卵㿗然小兒患此若治之不早則成痼疾如腰曲腹痛冷汗自出而陰囊二子吊縮入腹痛止方出名為內吊用烏梅散勻氣散金茱丸金鈴散為治有陰莖全縮不見有陰囊光腫不痛此因肝腎氣虛宜以橘子仁煎湯調下金鈴散勻氣散皆可投之內經曰㿗癃疝膚脹者陰亦盛而脈脹不通故曰㿗癃疝由是觀之乃陰氣盛而致有此吊縮者筋急也筋遇寒則引縮遇熱則縱弛故三因所用方法以寬小腸氣疏風為治然小兒此證多因坐陰潤之地惑風濕而得用當歸散加檳榔蒼朮水薑煎服並青木香湯鉤藤膏外以立消散傅之有外腎無故而膚囊腫大不燥不痛光亮如吹此名氣虛所致以勻氣散調治三因方家韭子丸主之一證外腎膚囊赤腫通明及女兒陰戶腫脹乃心熱之所傳皆以木通散導赤散為治或用薏苡仁煎湯調五苓散及以外消散敷之並投天花散用無灰酒煎下不能飲者水煎少入酒同服亦好驚癱鶴膝肝者東方青龍木也其動則應於風病則主驚駭諸熱引肝風有風則生痰有痰亦作搐小兒驚風之際手足動掣當聽其自定然後療之免生異證或父母見其病勢可畏從而按伏之豈知筋者肝之令也臨病發時若按束其手足則筋不舒伸遂至經絡為風所閉終為廢人內經曰頑弱名緩風疼重名濕痹又有四肢痿痹不仁致手足稍脹痛不堪忍者此風毒之氣使然故傳曰風淫末疾是也凡小兒心悸不常及遍身腫痛或手足不隨此為驚癱候也若治之稍遲至臂腕膝脛骨節之間流結頑核或膝大而腫肉消骨露如鶴膝之狀或為癰為癤此名鶴膝候也以上形證並宜發汗為先使腠理開通則風熱可除有濕亦去用百解散和㕮咀五苓散倍加麻黃水薑蔥煎服微得汗為度或以麻黃湯發散尤佳次防己湯祛風散及獨活湯加桑寄生投服並防風湯或黑虎丹作小丸子間服使風不生而痰不作則其疾易愈若為癰為癤疼重者用黑牽牛半生半炒略碾碎煎無灰酒調下五苓散以除流注之寒濕則腫毒可消如大府閉而不通此是風熱內蘊其右腮紅紫及右手三部脈浮而實滑宜五和湯或當歸散枳殼丸治之其加減之法尤在臨機審處若泥一方非良醫也前證更宜間服排風湯瘰癧瘰癧一證先賢名曰九漏究其所因似熱稽考形狀非一不過隨象命名大概初發於頸項肌肉之間未成膿者從本引末可使衰去針之灸之敷之從其所因而施療然小兒幼弱豈堪針灸但以服餌塗貼之劑為治此疾多生於耳後及頸項兩旁初發止是一枚次必連生大小十數纏繞項下纍纍如貫珠逐個先腫作膿穿破輕者可愈重者難除先穴漏膿長歲不幹謂之漏項原其得病之初自足三陽感受風熱與血氣相搏而成治以百解散加當歸散水薑蔥燈心煎服次用玄參飲及牛蒡湯木通散內消丸與之宣熱化毒洗以槲皮散塗用白芨散二香散使氣順血行膿干汁盡則自愈矣仍忌臊毒野味其證不致再作五淋巢氏病源曰諸淋皆腎虛所致腎與膀胱為表裡至水下入小腸通於胞行於陰而為溲腎氣通於陰下流之道也淋有五名曰膏曰冷曰熱曰血曰石各具於後膏淋見小便有肥脂似膏而浮於小便之上此腎虛不能制其肥液而下行也冷淋先戰栗而後小便此亦腎虛而下焦受冷冷氣入胞與正氣交爭故小便澀而戰栗熱淋下焦有熱熱氣傳於腎流入於胞其溺黃多而澀間有鮮血同來者血淋熱之極也心者血之主外行經絡內行臟腑熱盛則失其常道心與小腸為表裡故下流而入於胞則為血淋石淋腎主水水結則化為石腎為熱所乘遇小便則莖中痛不得流利痛引小腹則沙石從小便出甚至塞痛令人昏悶遍身有汗而後醒此痛之使然蓋五淋者雖曰腎虛所致然小腸為受盛之府氣通於膀胱膀胱為津液之府氣通於腎余化下流而不通皆曰腎氣不足熱入膀胱水道澀而不利出入起數臍腹急痛蘊作有時或如豆汁膏血並以局方五淋散下龍腦雞蘇丸自然平愈及香芎丸補腎地黃丸與之疏導補益為上有癃閉遺溺二證與淋不同內經宣明五氣篇曰膀胱不利為癃不約為遺溺蓋癃者乃內藏氣虛受熱壅滯宣化不行非澀非痛但閉不通腹肚緊滿宜用㕮咀五苓散加木通車前子煎服遺溺者乃心腎傳送失度小腸膀胱關鍵不能約束有睡夢而遺者有不知而遺者皆是下元虛冷所致亦因稟受陽氣不足用三因方家韭子丸治之及參苓白朮散補腎地黃丸然此證法當實土以存水乃免滲泄之患所謂補腎不如補脾是也平胃散倍加益智仁銼碎水薑棗燒鹽煎空心溫服又有陰陽二閉證陰閉者為冷濕乘虛入里因而不通名曰陰閉以白芍藥湯加南木香水煎服及用炒鹽以絹帕兜令帶溫尉臍四圍並投五苓散入靈砂末溫鹽湯空心調下其效尤速陽閉者因暴熱所逼澀而不通名為陽閉以㕮咀五苓散加車前子燈心水煎服及木通散玉露飲益元散皆可用之或貼薑豉餅於臍上取效不拘陰陽二證悉能療之並投萬安飲腹痛內經舉痛論五臟卒然而痛者何氣使然岐伯曰經脈流行不止環周不休寒氣入經則稽遲泣音澀而不行故卒然而痛蓋小兒腹痛有藏寒痛鎖肚痛盤腸內吊痛積痛癥瘕痛痃痛癖痛吊腎痛偏墜氣寒疝痛蛔音回蟲動痛諸痛不同其名亦異故不可一概論之藏寒痛議附胎寒論後鎖肚痛一月內嬰孩忽乳不下咽肚硬如石赤如朱撮口而哭面青唇黑手足口氣俱冷是也始因斷臍帶不緊為風冷所乘證亦危急以白芍藥湯烏梅散一字金投之日久則難愈更參考臍風證內議論盤腸內吊痛議在夜啼論中積痛腹中陰陰而痛面黃不食兒大者口吐酸餿氣先治積滯後調脾胃其痛自止仍辨虛實和解治法見前傷積論中癥瘕痛乃久積所致亦能成疳此皆榮衛俱虛外則感受風寒內則過傷乳食停滯既久不能克化故邪並於陰為症陰則專靜凝而不移邪並於陽為瘕假物象形動而不息蓋此二證若久而不治亦成脾疳積或兩脅間有塊如石按之則痛不按則輕或面黃肌瘦肚硬而脹及有青筋晝涼夜熱蒸潮無時乳食減少愛吃泥土或大便釀瀉痛則身冷如冰法當調脾養胃用醒脾散參苓白朮散磨積理疳用化癖丸三稜散木香莪朮丸治釀瀉沒石子丸沉香檳榔丸然此積滯之疾非匕劑可療必須次第調理則日久自然平復痃痛者始則腹內一小長塊其硬如臂從腰纏轉或左或右良久痛甚則見於皮下不妨乳食其證先因有疾表解未盡遽爾下之太過氣虛寒搏鬱結而成法宜益氣理虛用參苓白朮散沉香檳榔丸木香莪朮丸為治或間投白芍藥湯加人參茯苓水薑煎服癖痛者癥瘕痃癖四證大同小異各有治法惟癖證詳論在前吊腎偏墜痛論在陰囊腫證內當理腎和氣寒疝痛即在疝證論中詳備蛔蟲動痛口吐清水涎沫或吐出蟲痛不堪忍其疾因食甘肥葷腥太早而得故胃寒蟲動作痛其蟲吐來或生或死兒小者此痛苦甚亦致危難先以理中湯加烏梅水煎服使胃暖不逆次蘆薈丸使君子丸化蟲飲主之有兒大者面㿠白而間黃色肉食倍進肌體消瘦腹中時復作痛此有血鱉蛔蟲雜乎其間以二聖丸下之又有胃受極寒極熱亦令蟲動或微痛或不痛遽然吐出法當安蟲為上若以治蟲反傷胃氣固不可也因寒而動者用理中湯加烏梅水煎服因熱而動者用㕮咀五苓散亦加烏梅水薑煎投丁奚丁奚者亦久積成疳之證皆因飲食過傷於脾胃脾胃虛不能磨化飲食飲食漸減無以生其氣血面白色慘潮熱往來腹大而多青筋手足如筒顱腮開解頸項小而身黃瘦先投萬應丸次參苓白朮散早晨一服與養胃氣及醍醐散進食食後下烏犀丸三粒至五粒助脾化食此即用迎奪之法間投醒脾散沉香檳榔丸木香莪朮丸次第調理有渴瀉腹痛千金膏自好若脾氣稍和飲食漸進再以化癖丸快活丸常服或用烏犀丸略下二三行勻氣散止補有寒熱往來柴胡飲主之腹脹投南星腹皮飲有餘熱麥芽柳枝煎湯調三解散有蟲下使君子丸故斯疾得之非一朝一夕然施治之法亦須漸漸令其平復欲求速效則為難矣凡雞酒羊面魚鮓甘甜生冷毒物宜忌之哺露者亦由乳哺不節損於脾胃脾胃損而飲食減形容贏瘦則臟腑之氣不能宣通時間有熱謂之哺露此候與丁奚相去不遠但食多吐逆藏氣虛冷而泄瀉無度糞中有蟲治法同前丁奚證藥惟加養臟湯服之口瘡口瘡一證形與名不同故治法亦異有發於未病之前有生於已病之後大抵此疾不拘肥瘦有血氣盛者又加將養過溫或心脾二經有熱或客熱在胃熏逼上焦而成其瘡此為實證宜宣熱拔毒使無炎熾自然作效可用當歸散加升麻乾葛黃芩水薑蔥燈心煎服及投牛蒡湯拔毒飲木通散點以消黃散若口內白爛於舌上口外糜潰於唇弦瘡少而大不甚為痛常流清水此因脾胃虛熱上蒸內已先發而後形於外宜百解散疏表當歸散水薑棗煎服和胃氣理虛熱次投牛蒡湯三解散塗以緑袍散立效飲黃金散或投天竺黃散地黃膏若瘡生於口角是脾有積熱才開口則燥痛飲食多難甚至再有外風吹著便覺折裂微有清血謂之燕吻瘡治法同前藥餌輕者用甑蓋上炊流汁塗之亦驗有口唇下成小片赤爛此因飲食膩汁淋漓不潔蓋以嬰兒皮肉脆嫩浸漬成瘡及有風熱乘之名曰承漿瘡又謂之疳蝕瘡其所因者一也治法同前證內藥劑有無故口臭糜潰而不成瘡或服涼劑或塗末藥不能療者此名元焦故叔和脈訣云陰數脾熱並口臭是脾家有虛熱上攻於口宜服回陽散兒大者用黑錫丹早食前新汲井水入鹽少許調勻送下與正元氣及參苓白朮散調元散服之以立效飲黃金散乾點潰爛處或用蒸蜜同熟水調點舌上令其自化咽下無妨誠良法也仍忌毒物諸瘡內經曰諸痛癢瘡瘍皆屬心火火鬱內發致有斯疾蓋心主乎血血熱生風熱鬱內甚遞相傳襲故火能生土血注陽明主肌肉風熱與血熱相搏發見皮膚其名不一有黃膿而白者土生金母歸子也始生微癢而熱輕腫痛潰爛為熱極血凝化水氣滯成膿甚至寒熱作而飲食減尤為可慮宜宣泄風毒涼心經解胃熱用當歸散加黃連升麻乾葛水薑蔥燈心煎服及三解散牛蒡湯木通散間服塗以四黃散一抹金若頭上散生成片常常燥癢毛髮稀少有類白屑此因積熱上攻名曰禿瘡瘡雖生於頭世人只知以藥外敷得愈不逾旬月其瘡又發何為而然蓋頭者諸陽所會之處洪範五行火曰炎上熱毒上攻兩陽相灼故瘡生於頭法當解陳莝音銼之積熱導心經之煩燎音了斯可矣宜百解散倍加五和湯水薑蔥燈心煎服次連床散塗之及四黃散亦好有遍身糜潰成片甚至煩躁衣不可著蓋因風火內鬱於陽明流毒於外名曰風熱瘡用百解散加五和湯入何首烏荊芥白芷水煎服及牛蒡湯當歸散木通散五黃湯疏滌腸胃解散風熱其瘡自愈不致再生外則塗以四黃散或連床散亦佳若見滿頭連額有痂如癩或成黃膿即是驚風積熱久滯在裡致上熏於頭皮名胎風瘡俗曰甜瘡亦以百解散先和表次水晶丹去積疏風或用烏犀丸與之寬利勻氣散止補然後塗以連床散四黃散或投消毒飲自然獲安更隨稟賦虛實療之應湯火瘡先用羌活散發表次以玄霜膏塗之即效目疾純陽之子始生旬月忽兩目俱紅弦爛澀癢成醫此因在胎為母感受風熱傳於心肝而得先以百解散加當歸散水薑燈心煎服次導赤散及牛蒡湯加黃連木賊蟬殼水煎服自效有熱極夾風則目赤腫痛晝夜不開驚啼不已先用九仙散水薑蔥煎投次三解散溫米泔水調下及點以黃連膏若豆瘡之後眼生翳障昏澀流淚或浮腫不開此豆瘡餘毒攻肝投百解散少加五和湯水薑燈心煎服次用牛蒡湯解之洗以黃金散及多投柿煎散有豆瘡後眼中成翳或大或小無非餘毒使然亦用牛蒡湯及甘桔湯加蟬殼白蜜水煎服次以金波散黃金散無時頻洗更詳虛實為治並羌活散加薄荷穀精草白菊花水燈心薑皮煎投間以糖煎散服若天行時證暴赤腫痛晝夜苦甚久則昏蒙治法先以九仙散解表次小柴胡湯去半夏加大黃薄荷竹葉生地黃水煎服並投草龍膽散及點用黃連膏貼以清涼膏有孩兒胃氣表虛脾氣實盛眼胞赤腫羞澀不開遽投苦寒之劑以退赤腫反傷脾胃不吐則瀉或四肢微冷復以溫藥調治則目疾轉加宜先用㕮咀五苓散水薑燈心煎服次投瀉黃散自愈有心脾蘊熱經久及肝受邪熱致兩目羞明眼胞浮腫微有紫色大府閉或流利小便澀或通順先以百解散發表次投明目飲自然平復仍忌酒葷三五日有小兒薄劣多致塵埃入目揩摩成腫發熱作痛啼哭不已宜用闢塵膏治之立效丹毒經云赤紫丹瘤皆心火內鬱而發赤如丹砂故名丹毒心主血而火性熱血熱相搏陰滯於陽即發丹毒心虛寒則癢心實熱則痛自腹生出四肢者易治自四肢生入腹者難療先用百解散表之次以當歸散加連翹荊芥水煎服及牛蒡湯加炒麻仁研碎同煎與宣熱拔毒其次赤葛散或初用化丹湯亦好有身上發時亦如前證不甚燥癢但見出浮於遍體神昏不悅名陰濕毒證先以沖和飲加南木香水薑煎服次用當歸散雄黃散然此二證不問赤白若入腹入腎多致為害不可輕視如常自取困爾重舌凡患此證是脾與心肝屢受極熱有所謂重舌木舌又謂之舌黃鵝口名雖異皆熱也大抵重舌生於舌下挺露如舌故曰重舌然脾之絡脈系舌旁肝之絡脈系舌本心之絡脈系舌根凡此三經或為濕熱風寒所中則舌卷音捲縮或舒長或腫滿宜消黃散緑袍散主之及當歸散羌活散與服木舌者舌腫硬而妨乳食此為風熱盛也以當歸瀉黃散玉露飲皆可服之次消黃散點擦舌上蓋舌者心之官心熱則生瘡破裂肝壅則血出如湧脾閉則白胎如雪熱則腫滿風則強木口合不開四肢壯熱氣喘語澀即其候也治法涼解上焦及心肝脾三經邪熱疏風化痰初用百解散加五和湯水薑燈心煎投次以牛蒡湯同當歸散入生地黃水薑煎服鵝口者始生嬰兒自一月之外至半歲以上忽口內白屑滿舌則上齶戴礙狀如鵝口開而不合語聲不出飲食多艱亦因感受熱毒停積於脾故上蒸於舌至極時藥不能頓治急以絹線札針嘴約以粟谷長刺破舌上下小疱如芥子大見黃水清血微出即減方投前證內藥同服及以硃砂膏地黃膏調化塗點舌上咽下無妨或消黃散亦好五軟戴氏論五軟證名曰胎怯良由父精不足母血素衰而得誠哉是言以愚推之有因母血海久冷用藥強補而孕者有受胎而母多疾者或其父好色貪酒氣體虛弱或年事已邁而後見子有日月不足而生者或服墮胎之劑不去而竟成孕者徒爾耗傷真氣苟或有生譬諸陰地淺土之草雖有發生而暢茂者少又如培植樹木動搖其根而成者鮮矣由是論之嬰孩怯弱不耐寒暑縱使成人亦多有疾爰自降生之後精髓不充筋骨痿弱肌肉虛瘦神色昏慢才為六淫所侵便致頭項手足身軟是名五炊治法用調元散補腎地黃丸漸次調養日久乃安若投藥不效亦為廢人有小兒體肥容壯不為瘦瘁忽然項軟傾倒此名下竄皆因肝腎氣虛客邪侵襲風府傳於筋骨故成斯疾蓋肝主乎筋腎主乎骨筋骨俱弱則項軟垂下無力又名天柱倒與五軟相類不遠治同前藥有解顱一證其囟縫不合此腎氣不足腎主骨而腦為髓海腎氣不足則腦髓不滿故不合也名曰解顱凡得此候不及千日之內間有數歲者偶因他疾攻激遂成廢人若氣色精明能飲食者多服調元散補腎地黃丸旬月內頗見效者次第調理或有可治若投藥後如故亦難療矣世言囟腫皆以為熱殊不知有陰陽二證切宜詳辨堅硬為陰紅軟為陽故嬰孩寶書云寒氣上衝則牢𩊅音報熱氣上衝則柔軟正此之謂若陰證以勻氣散理中湯主之陽證用玉露飲當歸散防風湯為治有囟陷者虛之極也胃氣虛寒則囟陷慢驚中有之胃寒脾困吐瀉者為虛極急以金液丹固真湯及諸救元等藥治之外則貼以烏附膏有後枕陷者其證尤重治法以囟陷藥同不效亦為難療此大虛極百無一活耳諸汗汗者心之液故叔和心臟歌曰液汗通皮潤聲言爽氣清蓋人之氣血猶水火也平則寧偏則病陰虛陽必湊則發熱自汗陽虛陰必乘則發厥自汗小兒脾虛自汗多出額上沾黏人手速救胃氣全蠍觀音散用薑棗煎湯調服及沉香飲為治脾虛瀉自汗遍身冷而出有時遇瀉則無瀉過即有此候大虛急當補脾投益黃散參苓白朮散附子理中湯肺虛自汗其候右臉色多㿠白肺脈按之無力蓋久因咳嗽連聲不已痰少不活乃肺經虛氣上壅致令汗出宜用補肺散為治及以藿香飲調脾此又益母救子之義也慢驚自汗遍體俱有其冷如冰此證已危金液丹固真湯主之有實證自汗外因感冒風邪發熱無問昏醒浸浸汗出當救表解肌用百解散水煎服或間投五苓散溫白湯調下有小兒無疾睡中遍身汗出如水覺而經久不幹此名積證盜汗脾冷所致用三稜散水煨薑煎服次投益黃散參苓白朮散有時時冷汗微出髮根如貫珠面額上濈濈然此為驚汗證宜鎮驚丸或琥珀抱龍丸及茯神湯加麻黃根水煎服取效有夜睡中而汗自出者名曰盜汗巢元方論云病因睡寐中而身體汗流此因陽虛所致久不已者令人羸瘠枯瘦心氣不足津液妄出故也用茯神湯加黃耆水薑棗燒鹽煎服黃證凡黃病者不可一概而論標本不同證治亦異故嬰孩寶書云黃病皆因胃熱所為由是觀之乃脾胃氣虛感受濕熱鬱於腠理淫於皮膚蘊積成黃熏發於外故有此證或脾胃虛弱內因症癖攻之而成然疳瀉亦主皮黃髮豎肚大青筋肌肉消瘦外無色澤身必發黃此又本於疳病而作致有是證治法若感濕熱而得身黃如煙燻之色以㕮咀五苓散加麻黃水薑煎投汗之即愈或用茵陳蒿湯調下五苓散亦好若得於疳癖者其形如黃土相類以醒脾散化癖丸醒脾快胃磨積理疳胃氣既和飲食倍進運化精微榮養百骸灌溉臟腑五色各見於本部精華乃形於面貌其黃自除有嬰孩生下便見遍體俱黃惟兩目弦厚如金色身發壯熱名為胎黃皆因未産之前母受極熱而傳於胎故有其證乳母宜服生地黃湯使藥入於乳令兒飲之必獲安矣失血小兒九道出血何為而然蓋人之所有者血與氣也心者血之主肺者氣之主氣主詬之血主濡之榮養百骸灌溉孫脈升降上下榮衛諧和自然順適一或不調疾由生矣或外為六淫所侵內因七情所汨氣乃留而不行血乃壅而不濡內外抑鬱不能流注以榮於身必有妄動之患叔和以芤脈為失血之義在七表屬陽故也陽明主乎多氣多血未有不因熱而得蓋氣血俱熱毒郁內逼失其常度是以妄行有在襁褓患此證者因非七情所傷皆因乳母執著不自寬釋及淡辛辣之味流於乳絡兒飲之後停滯不散鬱蒸於內亦能動血又或居重幃暖閣火氣熏逼不令常見風日積溫成熱或極則湧泄或吐或衄或大小府亦多血來者有氣出而邪熱乘之則血不得循流故道滲於諸經亦生走失之證其面㿠白脈沉微血淡紫口氣緩是也又況嬰孩脆弱易虛易實因熱內攻血隨氣行或壅而上逆或下而妄返遂有吐血衄血瀉血溺血之證然而血不自動因氣使之風不自生因熱而起由是而論可以類推治法先明虛實審得病源隨經施治藥餌無差則不失其機要實則小柴胡湯加生地黃絲茅根或苦參亦好並用水煎服或㕮咀五苓散合五和湯亦加絲茅根苦參水煎及投消毒飲次用局方雞蘇丸三黃丸間服虛則理中湯及人參芎歸湯皆可服間有醫者見其血盛以為熱極過投涼劑遂使血寒不能歸源而妄流其色紫黯而凝滯或成小片當服薑附之劑以溫之自然流暢毋致妄行為佳不內外因愚嘗論十歲以上小兒飲酒啖熱因熱動血醉飽掬撅胃脘吐血甚至鼻口俱出此非內因外因之使然乃自取過耳治法先用百解散去桂加黃連水蔥燈心煎服疏利熱毒次以小柴胡湯加生地黃或藕節水薑煎下定吐止血其證自除有長成小兒偶固他物自傷或戲走失足觸損兩目血脹腫痛晝輕夜重投速效飲即快仍忌雞酒羊面三五日庶易瘥也有因飲食中誤吞骨鯁吐不出咽不下氣鬱生痰痰裹其骨內則作痛外則浮腫啼聲似啞亦為可慮投備急散取效有孩兒貪劣因弄刀錐或乘高墮地致傷皮破血出輕者先用桃花散敷之仍服活血散以勻其血毋使作膿潰爛肌肉有僅十五歲者恃其血氣方剛惟務馳騁多致落馬墮車或鬥很跌折肢體一切損證及毒蟲惡獸所傷此又世醫各有專科茲不繁引小兒常安康節曰與其病後求良藥不若病前能自防然致疾之始必有所因大凡幼稚要其常安在乎謹寒暄節飲食夫復何慮每見嬰孩目有所睹心有所欲但不能言惟啼泣而已父母不察其詳便謂飢渴遽哺之以乳食強之以雜味不亦多乎有數歲者嬌惜太過不問生冷甘肥時果聽其貪食豈能知足愛之實以害之遂傷脾胃不吐則瀉或成疳積浮腫傳作異證此則得於太飽之故有遇清朝薄暮偶見陰晦便加以厚衣重衾或近於紅爐烈焰又且拘之懷抱惟恐受冷及長成者所愛亦復如是遂致積溫成熱熱極生風面赤唇紅驚掣煩躁變證多出此乃失於太暖之故殊不知忍一分飢勝服調脾之劑耐一分寒不須發表之功余故曰孩提之童食不可過傷衣不可太厚此安樂法也為父母者切宜深省拾遺論小方脈數差殊宣和御醫戴克臣侍翰林曰得叔和小兒脈訣印本二集一本云呼吸須將六至看一本云呼吸須將八至看遂與內臺高識參詳字義審察至數就診五歲兒常脈一息六至者是八至者非蓋因鏤板之際誤去六字上一點一畫下與八字相類致此訛傳逮與卒以學易作五十以學易之誤是也嘗考默庵張氏脈訣亦云小兒常脈一息只多大人二至為平即六至也然一呼一吸之間六至明矣不然姑俟來者考之辨藥病不相主對鄭氏議古人醫書不能無失如錢氏治慢驚用栝蔞湯與病不相主對是謂之失以愚觀之所傳藥性醫者之通曉縱有前證未必肯用但不容不講明耳殊不知錢氏既沒之後其書成於仕路故人閻孝忠編集刊行屢經異代況錢氏儒醫名聞朝野施治之法如珠在貫未嘗少差鄭氏所指慢驚誤用栝蔞湯然本方下明載治肺熱涎盛非為慢驚之設閻孝忠豈不知此其或居官録梓之日失於參考訛傳此劑致有前議今歷年已遠卒難校正若論五臟補瀉之妙卻無瑕可指及諸雜方有功於世不為不多直訣一書信不誣矣治豆瘡不應疏利張氏治小兒豆瘡法若才覺是其證便當疏利又云若才見出時皆不可轉利自立兩説遂使後人多生疑惑以何為當此張氏之論別矣劉茂先曰嬰孺豆瘡一證屬裡首尾無下法若下之則裡虛毒氣何由而發泄必至傳變大要愛護庶獲全安此茂先之言是也然後學不可執一而取當擇其善者而從之亦有孩兒稟賦素實豆瘡出見遍體紅壯光澤飲食快順無外證自然效速如俗用符水神藥皆非良法慎勿輕信耳評非時用附子大黃前賢議曰小兒證候最易虛易實要施治得宜如隆暑戒用附子隆寒戒用大黃若用之是實實虛虛損不足而益有餘此亦理到之論以愚評之拘一法者不足以善兵泥一説者不足以善學在乎通變而已記嘗城居侯自牧次子五歲盛夏泄瀉面垢煩渴耳尻冷驚悸多診其心肝脈浮而洪大脾肺脈虛而細數豫曰面垢渴瀉脈虛細數者此中暑也驚悸發熱耳尻俱冷心肝脈洪大者此豆瘡欲作也先服黃連香藿散解利暑氣續投陳氏異功散再加附子與之實脾二日瀉止三日瘡見不旬余而收全功此隆暑用附子之效也又本路總管楊侯幼子四歲臘月得患驚風搐掣諸醫調治前證俱解但神昏不食四肢微冷已五日矣前醫用醒脾助陽之藥不一而足余診六脈獨脾脈沉滑餘脈微緩脾脈沉而滑者此積蘊在脾乃為脾約當主大便不利非陰厥也彼曰然遂用瀉黃散加大黃水煎並三服大府一通神氣清而飲食進隨獲安可此隆寒用大黃之功也用藥如用兵當用豈容自已如五月渡滬雪夜平蔡何待秋高馬肥而後為之若拘以四時取用則兵藥無成功矣愚不敏歷醫五十餘載凡調理旬月外嬰孩有病所用寒涼溫燥之劑必先明標本辨虛實然後處之以藥屢試輒效此特又在察色聽聲心誠求之而得非假脈取三歲之上小兒以色合脈尤其為妙嘗用已驗活法拯療諸疾危而復安者多矣姑以楊侯二家疑難之證詳述於前非矜能也明小兒四證八候四證者驚風痰熱是也八候者搐搦掣顫反引竄視是也搐者兩手伸縮搦者十指開合掣者勢如相撲顫者頭偏不正反者身仰向後引者臂若開弓竄者目直似怒視者睛露不活四證已備八候生焉四證既無八候安有專是業者可不究心及此脈病證治明有條類大抵嬰孩得疾如火燎原撲之在微不致有延蔓之盛療病亦然若初覺是受驚傷風發熱便與疏解何患有傳變之誤所謂閭門之盜不可以固留逆流之水不可以順決此有疾在謹初之意也治暑風用藥次序衡州萬戶張侯寓屯田日長子三歲六月得患不語手足蜷縮已經二旬命余至彼諸醫議論不一觀外形面垢有熱氣促流涎口眼喎斜不省人事次則手足俱冷而蜷縮身臂反張診六脈沉按而取獨心肝脈虛而細數餘脈緩弱余曰面垢色脈細數此因中暑感風前賢所謂暑風者是也手足冷縮而不伸或服涼劑太過寒之使然若手足溫其效自速愚以治法分陰陽順乎氣五苓散加寬氣飲薑汁沸湯調下三服其證稍慢次疏風和榮衛百解散加荊芥人參當歸水薑煎投隨以溫灰湯澆洗手足藥一服洗一次至八九次手足溫則血活血活則筋舒筋舒則手足運動如常餘熱未除消暑清心飲主之聲音不全二聖散取效調理惟用萬安飲恰九日前證俱減張侯曰此子更生端藉藥力不敢妄也因筆漫紀後有是證仿此活人亦方便心矣為醫要量大見高元貞乙未春有王千戶來自廣西安船河下一子僅二周患頭痛服藥針灸不效召以診視色脈具好惟額上微紅以手法驗之大哭淚下其母怒而見紿愚亦置之勿論但究心以病為事再問當間得證之因千戶云初在靜江大風吹篷撲著便不快豫曰此疾若令細揣頭上便知其證彼諾之遂遣家人出外探親其父自抱手揣之果有小篾簽刺在囟上皮下即篷簽也以酥油潤透用摘鑷取出痛定即安若初以匹婦饒舌而退則及幼之心不溥矣後之醫流儻見嬰孩色脈好而病者用藥不應必有他故宜究心推原切勿拘泥可也遇諸塗救治驚風大德戊戌夏因幹出郭至五里外見有夫婦二人抱子而哭於道旁問之答曰入城探親三歲孩兒忽得驚風不省人事觀其面青黯色目閉神昏診之六脈全無按太衝脈沉而微有余顧曰毋慮此子可救且左右竟無人家遂於路側拾得破碗半邊有薑小塊細嚼捻汁碗中用五苓散蘇合香丸寬氣飲澆水調和灌下十數次方覺氣回聲出目開自此蘇矣漫附卷末同志鑑之
